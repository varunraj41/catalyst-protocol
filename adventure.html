<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catalyst Quest · Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="catalyst-shared.js"></script>
<style>
  :root {
    --ink: #1e2746; --ink-soft: #5b6681; --ink-mute: #9aa3bd;
    --card: #ffffff; --line: rgba(30,39,70,0.08); --line-2: rgba(30,39,70,0.04);
    --primary: #6366f1; --primary-2: #3b82f6;
    --lvl1-a: #10b981; --lvl1-b: #06b6d4;
    --lvl2-a: #0ea5e9; --lvl2-b: #6366f1;
    --lvl3-a: #f59e0b; --lvl3-b: #f97316;
    --lvl4-a: #a855f7; --lvl4-b: #ec4899;
    --gold: #f59e0b; --success: #10b981; --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body, #root {
    background:
      radial-gradient(1100px 600px at 8% -10%, #dbe7ff 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 0%, #ffe6d1 0%, transparent 55%),
      radial-gradient(900px 500px at 50% 120%, #f3e4ff 0%, transparent 55%),
      linear-gradient(180deg, #f8faff 0%, #fff8ee 100%);
    background-attachment: fixed; min-height: 100%;
  }
  body { margin: 0; font-family: 'Inter', sans-serif; color: var(--ink); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Fredoka','Inter',sans-serif; letter-spacing: -0.01em; }
  .font-mono    { font-family: 'JetBrains Mono', monospace; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 14px 40px -18px rgba(30,39,70,0.18), 0 4px 14px -8px rgba(30,39,70,0.08); }
  .card-soft { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px) saturate(130%);
    -webkit-backdrop-filter: blur(12px) saturate(130%); border: 1px solid var(--line); border-radius: 18px; }

  .btn-primary { background: linear-gradient(135deg,var(--primary),var(--primary-2)); color:#fff; font-weight:700;
    border-radius: 14px; border: none; box-shadow: 0 10px 28px -8px rgba(99,102,241,0.55), inset 0 1px 0 rgba(255,255,255,0.35);
    transition: all .25s cubic-bezier(.2,.8,.2,1); position: relative; overflow: hidden; }
  .btn-primary::before { content:""; position:absolute; inset:0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
    transform: translateX(-100%); animation: shimmer 3.8s infinite; }
  @keyframes shimmer { 0%{transform:translateX(-100%);} 55%,100%{transform:translateX(120%);} }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px) scale(1.02);
    box-shadow: 0 16px 38px -8px rgba(99,102,241,0.7), inset 0 1px 0 rgba(255,255,255,0.5); }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
  .btn-ghost { background: var(--card); border:1px solid var(--line); color: var(--ink);
    border-radius: 12px; font-weight: 600; transition: all .2s; }
  .btn-ghost:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }

  .chip { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:9999px;
    font-size:11px; font-weight:600; letter-spacing:0.06em;
    background: rgba(99,102,241,0.08); color: var(--primary); border: 1px solid rgba(99,102,241,0.2); }

  .opt { background:#fff; border:1px solid var(--line); border-radius:14px; transition: all .25s cubic-bezier(.2,.8,.2,1);
    text-align:left; width:100%; color: var(--ink); box-shadow: 0 2px 8px -4px rgba(30,39,70,0.08); }
  .opt:hover:not(:disabled) { transform: translateY(-2px); border-color: rgba(99,102,241,0.45);
    box-shadow: 0 14px 30px -16px rgba(99,102,241,0.4); }
  .opt.active { border-color: var(--success); background: linear-gradient(135deg,#ecfdf5 0%,#fff 100%);
    box-shadow: 0 0 0 2px rgba(16,185,129,0.35), 0 14px 30px -12px rgba(16,185,129,0.3);
    animation: pick .55s cubic-bezier(.2,1.6,.2,1); }
  @keyframes pick { 0%{transform:scale(1);} 40%{transform:scale(1.02);} 100%{transform:scale(1);} }

  /* Skip overlay */
  .skip-overlay { position: fixed; inset: 0; z-index: 80; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 50%, rgba(255,237,196,0.92), rgba(255,214,134,0.88));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    animation: skipFade 1.1s ease-out forwards; }
  @keyframes skipFade { 0%{opacity:0;} 15%{opacity:1;} 85%{opacity:1;} 100%{opacity:0;} }
  .skip-icon { animation: skipIcon 1.1s cubic-bezier(.2,1.6,.2,1) forwards; display: inline-block; }
  @keyframes skipIcon { 0%{transform:scale(0.2) rotate(-20deg);opacity:0;} 40%{transform:scale(1.2) rotate(8deg);opacity:1;} 70%{transform:scale(1) rotate(-4deg);} 100%{transform:scale(1) rotate(0);} }
  .skip-text { animation: skipText 1.1s cubic-bezier(.2,1,.2,1) both; animation-delay: 0.1s; }
  @keyframes skipText { 0%{opacity:0;transform:translateY(12px);letter-spacing:0.5em;} 60%{opacity:1;transform:translateY(0);letter-spacing:0.1em;} 100%{opacity:1;} }

  /* Observer L2 entrance animations */
  .avatar-pop { animation: avatarPop .8s cubic-bezier(.2,1.6,.2,1) both; }
  @keyframes avatarPop { 0%{opacity:0;transform:scale(0.3) rotate(-15deg);} 55%{opacity:1;transform:scale(1.15) rotate(6deg);} 80%{transform:scale(0.95) rotate(-3deg);} 100%{opacity:1;transform:scale(1) rotate(0);} }
  .avatar-float { animation: avatarFloat 3.5s ease-in-out infinite; }
  @keyframes avatarFloat { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-8px) rotate(2deg);} }
  .bubble-slide { animation: bubbleSlide .7s cubic-bezier(.2,.8,.2,1) both; animation-delay: 0.35s; opacity: 0; }
  @keyframes bubbleSlide { 0%{opacity:0;transform:translateX(-24px) scale(0.9);} 60%{opacity:1;transform:translateX(4px) scale(1.02);} 100%{opacity:1;transform:translateX(0) scale(1);} }
  .situation-reveal { animation: situationReveal .7s cubic-bezier(.2,.8,.2,1) both; animation-delay: 0.15s; opacity: 0; }
  @keyframes situationReveal { 0%{opacity:0;transform:translateY(8px);filter:blur(6px);} 100%{opacity:1;transform:translateY(0);filter:blur(0);} }
  .basket-drop-in { animation: basketDrop .8s cubic-bezier(.2,1.6,.2,1) both; animation-delay: 0.5s; opacity: 0; }
  @keyframes basketDrop { 0%{opacity:0;transform:translateY(-20px) scale(0.85);} 60%{opacity:1;transform:translateY(6px) scale(1.05);} 100%{opacity:1;transform:translateY(0) scale(1);} }
  .talking-dots span { display:inline-block; width:4px; height:4px; margin:0 2px; background: var(--lvl2-a); border-radius:9999px;
    animation: tdots 1.1s ease-in-out infinite; }
  .talking-dots span:nth-child(2){animation-delay:.15s;background:var(--lvl2-b);}
  .talking-dots span:nth-child(3){animation-delay:.3s;background:#ec4899;}
  @keyframes tdots { 0%,100%{transform:translateY(0);opacity:.4;} 50%{transform:translateY(-5px);opacity:1;} }

  .scene-enter { animation: sceneEnter .5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes sceneEnter { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }
  .pop-in { animation: popin .55s cubic-bezier(.2,1.6,.2,1) both; }
  @keyframes popin { 0%{opacity:0;transform:scale(.6);} 70%{transform:scale(1.08);} 100%{opacity:1;transform:scale(1);} }
  .stagger > * { animation: sceneEnter .45s cubic-bezier(.2,.8,.2,1) both; }
  .stagger > *:nth-child(1){animation-delay:.04s;} .stagger > *:nth-child(2){animation-delay:.12s;}
  .stagger > *:nth-child(3){animation-delay:.20s;} .stagger > *:nth-child(4){animation-delay:.28s;}
  .stagger > *:nth-child(5){animation-delay:.36s;} .stagger > *:nth-child(6){animation-delay:.44s;}

  .slot-fill { animation: slot-fill .45s cubic-bezier(.2,1.6,.2,1) both; }
  @keyframes slot-fill { 0%{transform:translateY(14px) scale(.94);opacity:0;} 60%{transform:translateY(-2px) scale(1.03);opacity:1;} 100%{transform:translateY(0) scale(1);opacity:1;} }

  /* Scene-change pill — big centered banner shown when question/card index advances */
  .scene-pill {
    position: fixed; left: 50%; top: 28%;
    transform: translate(-50%, -50%);
    z-index: 55;
    pointer-events: none;
    animation: scenePill 1.2s cubic-bezier(.2,1.4,.2,1) forwards;
  }
  @keyframes scenePill {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    30%  { transform: translate(-50%, -50%) scale(1); }
    70%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.94) translateY(-8px); }
  }
  /* Stronger slide-in for new-question content */
  .scene-slide-in { animation: sceneSlideIn 0.55s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes sceneSlideIn {
    from { opacity: 0; transform: translateX(28px) scale(0.985); filter: blur(4px); }
    to   { opacity: 1; transform: none; filter: none; }
  }

  .node-pulse { position: relative; }
  .node-pulse::after { content:""; position:absolute; inset:-6px; border-radius:9999px;
    border: 3px solid currentColor; animation: nodepulse 1.8s cubic-bezier(.2,.8,.2,1) infinite; opacity: .7; }
  @keyframes nodepulse { 0%{transform:scale(.85);opacity:.75;} 100%{transform:scale(1.45);opacity:0;} }

  .halo { position: relative; }
  .halo::before { content:""; position:absolute; inset:-14px; border-radius:inherit;
    background: conic-gradient(from 0deg, var(--primary), var(--lvl1-a), var(--lvl3-a), var(--lvl4-b), var(--primary));
    filter: blur(16px); opacity: .55; z-index:-1; animation: spin 8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .text-gradient { background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 40%, var(--lvl4-b) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; }

  .orb { position:absolute; border-radius:9999px; filter: blur(80px); pointer-events:none;
    animation: drift 20s ease-in-out infinite alternate; }
  @keyframes drift { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(26px,-20px) scale(1.1);} }

  .toast { position: fixed; right: 24px; bottom: 24px; z-index: 60;
    animation: toast-in .3s cubic-bezier(.2,1.4,.2,1) both, toast-out .3s ease-in 1.8s both; }
  @keyframes toast-in { from{opacity:0;transform:translateY(14px) scale(.95);} to{opacity:1;transform:none;} }
  @keyframes toast-out { to{opacity:0;transform:translateY(-6px);} }

  .tabular { font-variant-numeric: tabular-nums; }
  .timer-crit { animation: timer-crit .7s ease-in-out infinite; }
  @keyframes timer-crit { 0%,100%{filter: drop-shadow(0 0 4px rgba(239,68,68,.5));transform:scale(1);} 50%{filter: drop-shadow(0 0 14px rgba(239,68,68,.95));transform:scale(1.05);} }

  .progress-shimmer { background-image: linear-gradient(110deg, rgba(255,255,255,0) 25%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 75%);
    background-size: 200% 100%; animation: pshimmer 2s linear infinite; }
  @keyframes pshimmer { 0%{background-position:100% 0;} 100%{background-position:-100% 0;} }

  /* Basket drop-zone */
  .basket {
    background: linear-gradient(180deg, #fff7ed 0%, #ffedd5 100%);
    border: 3px dashed rgba(245,158,11,0.5);
    border-radius: 24px;
    transition: all .3s cubic-bezier(.2,.8,.2,1);
  }
  .basket.hover {
    border-color: var(--success);
    border-style: solid;
    background: linear-gradient(180deg, #ecfdf5 0%, #d1fae5 100%);
    transform: scale(1.03);
    box-shadow: 0 0 0 4px rgba(16,185,129,0.2), 0 20px 50px -12px rgba(16,185,129,0.35);
  }
  .draggable-card {
    cursor: grab;
    transition: transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s;
  }
  .draggable-card:hover { transform: translateY(-3px); box-shadow: 0 16px 30px -12px rgba(99,102,241,0.4); }
  .draggable-card:active { cursor: grabbing; }
  .draggable-card.dragging { opacity: 0.4; transform: scale(0.98) rotate(-1deg); }

  /* Avatar speech bubble */
  .bubble { position: relative; border-radius: 18px; padding: 14px 18px; }
  .bubble::before { content:""; position:absolute; left: -8px; top: 16px;
    border-width: 8px 10px 8px 0; border-style: solid; border-color: transparent; }
  .bubble-a { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
  .bubble-a::before { border-right-color: #fef3c7; }

  /* Manager scope */
  .manager-scope { font-family: 'Inter', sans-serif; color: var(--ink); }
  .manager-scope .font-display { font-family:'Inter',sans-serif; letter-spacing:-0.02em; font-weight:800; }
  .manager-scope .text-gradient { background:none; -webkit-text-fill-color: var(--ink); color: var(--ink); }
  .manager-scope .halo::before { display:none; }

  ::selection { background: rgba(99,102,241,0.2); }
  button { cursor: pointer; font-family: inherit; color: inherit; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const C = window.CatalystCore;
const { L1, L2, L3, L4, CONSTANTS, LEVEL_META, DIMENSION_LABEL, FINAL_LEVEL_META,
        LEVEL_SUMMARY, DEV_TIP, STRENGTH_NOTE, POS_SUMMARY, POSITIVE_BULLETS, BARS_DESCRIPTION,
        mockCandidates, computeResults, useCountUp,
        loadSavedCandidates, saveCandidate, mergeCandidates,
        shuffleArray, shuffleBalanced, fillAvatar } = C;
const { L1_TIMER, L2_CARD_TIMER, L3_TIMER, L4_TIMER, LOG_MS } = CONSTANTS;

const LVL_COLORS = {
  1: { a: "var(--lvl1-a)", b: "var(--lvl1-b)", icon: "compass" },
  2: { a: "var(--lvl2-a)", b: "var(--lvl2-b)", icon: "eye" },
  3: { a: "var(--lvl3-a)", b: "var(--lvl3-b)", icon: "chess" },
  4: { a: "var(--lvl4-a)", b: "var(--lvl4-b)", icon: "key" }
};
function levelMeta(n) { return { ...LEVEL_META[n], ...LVL_COLORS[n] }; }

/* ============ ICONS ============ */
const Icon = ({ name, className="w-5 h-5", stroke=1.8 }) => {
  const p = { fill:"none", stroke:"currentColor", strokeWidth:stroke, strokeLinecap:"round", strokeLinejoin:"round" };
  switch (name) {
    case "compass": return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="12" r="9"/><path d="m15 9-2 6-4 2 2-6 4-2Z"/></svg>;
    case "eye":     return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>;
    case "chess":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M8 22h8M9 18h6M9 18v-2a3 3 0 0 1 6 0v2M12 13V9M8 9h8l-1-3H9l-1 3ZM11 6V3h2v3"/></svg>;
    case "key":     return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="8" cy="15" r="4"/><path d="m11 12 10-10M17 6l3 3M14 9l3 3"/></svg>;
    case "map":     return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3V6Z"/><path d="M9 3v15M15 6v15"/></svg>;
    case "flag":    return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M4 22V4M4 15h10l-2-3 2-3H4"/></svg>;
    case "trophy":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M7 3h10v5a5 5 0 0 1-10 0V3Z"/><path d="M4 5h3M17 5h3M12 13v4M8 21h8M10 21v-4h4v4"/></svg>;
    case "star":    return <svg viewBox="0 0 24 24" className={className}><path d="m12 2 2.9 6.9L22 10l-5.5 4.8L18 22l-6-3.5L6 22l1.5-7.2L2 10l7.1-1.1L12 2Z" fill="currentColor"/></svg>;
    case "sparkles":return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m12 3 1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3Z"/></svg>;
    case "check":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m5 12 5 5L20 7"/></svg>;
    case "lock":    return <svg viewBox="0 0 24 24" className={className} {...p}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>;
    case "play":    return <svg viewBox="0 0 24 24" className={className}><path d="m6 4 14 8-14 8V4Z" fill="currentColor"/></svg>;
    case "arrow-right": return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case "restart": return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>;
    case "user":    return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>;
    case "briefcase":return <svg viewBox="0 0 24 24" className={className} {...p}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 13h18"/></svg>;
    case "target":  return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>;
    case "bolt":    return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>;
    case "shield":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 3 4 6v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V6l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg>;
    case "heart":   return <svg viewBox="0 0 24 24" className={className}><path d="M12 21s-7-4.5-9.5-9C1 8 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6 4 4.5 8-2.5 4.5-9.5 9-9.5 9Z" fill="currentColor"/></svg>;
    case "medal":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M8 2 6 6l6 2 6-2-2-4"/><circle cx="12" cy="15" r="6"/></svg>;
    case "alert":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 3 2 21h20L12 3Z"/><path d="M12 10v5M12 18h.01"/></svg>;
    case "clock":   return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case "close":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m6 6 12 12M6 18 18 6"/></svg>;
    case "portal":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M15 3h6v6M21 3l-8 8M9 21H3v-6M3 21l8-8"/></svg>;
    case "download":return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 4v12M6 12l6 6 6-6M4 20h16"/></svg>;
    case "basket":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M3 10h18l-2 10H5L3 10Z"/><path d="m7 10 3-6M17 10l-3-6M12 14v4"/></svg>;
    case "grip":    return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg>;
    default: return null;
  }
};

/* ============ SCENE-CHANGE PILL ============ */
function SceneChangePill({ idx, total, label, colorA, colorB }) {
  return (
    <div className="scene-pill">
      <div className="flex items-center gap-4 px-6 py-4 rounded-2xl shadow-2xl"
           style={{
             background: `linear-gradient(135deg, ${colorA}, ${colorB})`,
             color: "#fff",
             boxShadow: `0 24px 60px -12px ${colorA}aa, inset 0 1px 0 rgba(255,255,255,0.3)`
           }}>
        <div className="font-display text-xs font-bold tracking-[0.3em] opacity-85">{(label || "SCENE").toUpperCase()}</div>
        <div className="h-6 w-px bg-white/40"/>
        <div className="font-display text-3xl md:text-4xl font-black tabular leading-none">
          {idx + 1}<span className="text-white/60 text-xl ml-1">/ {total}</span>
        </div>
      </div>
    </div>
  );
}
function useScenePill(idx) {
  const [show, setShow] = useState(false);
  const [pillKey, setPillKey] = useState(0);
  useEffect(() => {
    if (idx > 0) {
      setPillKey(k => k + 1);
      setShow(true);
      const t = setTimeout(() => setShow(false), 1150);
      return () => clearTimeout(t);
    }

/* ============ CIRCULAR TIMER ============ */
function CircularTimer({ value, max, size=64, colors=["#6366f1","#3b82f6"] }) {
  const r = size/2-5, CC = 2*Math.PI*r, pct = Math.max(0,Math.min(1,value/max)), off = CC*(1-pct);
  const crit = value<=3, stroke = crit?"#ef4444":colors[0];
  return (
    <div className={"relative "+(crit?"timer-crit":"")} style={{width:size,height:size}}>
      <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full -rotate-90">
        <defs>
          <linearGradient id={`tg-${size}`} x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%"  stopColor={crit?"#ef4444":colors[0]} />
            <stop offset="100%" stopColor={crit?"#f59e0b":colors[1]} />
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(30,39,70,0.08)" strokeWidth="4"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`url(#tg-${size})`} strokeWidth="4"
                strokeLinecap="round" strokeDasharray={CC} strokeDashoffset={off}
                style={{transition:"stroke-dashoffset 100ms linear"}}/>
      </svg>
      <div className="absolute inset-0 flex items-center justify-center">
        <span className="font-display text-lg font-bold tabular" style={{color:stroke}}>{Math.ceil(value)}</span>
      </div>
    </div>
  );
}

function Level2Screen({ scenario, onSubmit, logging }) {
  const [phase, setPhase] = useState("avatar"); // avatar | briefing | playing | done
  const [avatar, setAvatar] = useState(null);
  const [deck, setDeck] = useState([]);
  const [cardIdx, setCardIdx] = useState(0);
  const [decisions, setDecisions] = useState([]); // {cardId, dimension, level, decision, responseMs}
  const [timeLeft, setTimeLeft] = useState(L2_CARD_TIMER);
  const [cardKey, setCardKey] = useState(0);
  const startedAt = useRef(Date.now());
  const cardShownAt = useRef(Date.now());

  const pickAvatar = (a) => {
    setAvatar(a);
    setDeck(shuffleBalanced(scenario.cards, 2));
    setPhase("briefing");
  };

  const beginPlaying = () => {
    startedAt.current = Date.now();
    cardShownAt.current = Date.now();
    setPhase("playing");
  };

  const finish = (finalDecisions) => {
    setPhase("done");
    const dt = Date.now() - startedAt.current;
    setTimeout(() => onSubmit({
      avatar: avatar ? avatar.id : null,
      decisions: finalDecisions,
      auto: finalDecisions.every(d => !d.decision),
      responseMs: dt
    }), 700);
  };

  const recordDecision = (decision /* "most" | "least" | null */) => {
    if (logging || phase !== "playing") return;
    const card = deck[cardIdx];
    const next = [...decisions, {
      cardId: card.id, dimension: card.dimension, level: card.level,
      decision, responseMs: Date.now() - cardShownAt.current
    }];
    setDecisions(next);
    if (cardIdx + 1 < deck.length) {
      setCardIdx(cardIdx + 1);
      setCardKey(k => k + 1);
      cardShownAt.current = Date.now();
    } else {
      finish(next);
    }
  };

  // per-card timer
  useEffect(() => {
    if (phase !== "playing" || logging) return;
    const start = Date.now(), duration = L2_CARD_TIMER * 1000;
    setTimeLeft(L2_CARD_TIMER);
    let cancelled = false, fired = false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(rem);
      if (rem <= 0 && !fired) { fired = true; recordDecision(null); }
      else if (rem > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [phase, cardIdx, logging]);

  /* ---- AVATAR SELECT ---- */
  if (phase === "avatar") {
    return (
      <div className="scene-enter max-w-3xl mx-auto px-4 md:px-8 py-8">
        <div className="card-soft p-4 mb-5 flex items-center gap-4">
          <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white shrink-0" style={{background:"linear-gradient(135deg,var(--lvl2-a),var(--lvl2-b))"}}>
            <Icon name="eye" className="w-5 h-5"/>
          </div>
          <div className="flex-1">
            <div className="font-display font-bold">Level 2 · The Character Mirror</div>
            <div className="text-xs text-[var(--ink-soft)]">Choose your character</div>
          </div>
        </div>

        <div className="card p-6 md:p-10 text-center relative overflow-hidden">
          <div className="orb absolute -top-10 -left-10 w-72 h-72" style={{background:"#d7e4ff",opacity:0.7}}/>
          <div className="orb absolute -bottom-16 -right-10 w-64 h-64" style={{background:"#f3ccff",opacity:0.6,animationDelay:"-8s"}}/>
          <div className="relative">
            <h2 className="font-display text-3xl md:text-4xl font-extrabold">Pick Your <span className="text-gradient">Lead</span></h2>
            <p className="text-[var(--ink-soft)] mt-2 max-w-md mx-auto">You'll watch this character handle work situations. Pick whoever feels easier to relate to.</p>

            <div className="mt-8 grid grid-cols-2 gap-4 max-w-lg mx-auto">
              {scenario.avatars.map(a => (
                <button key={a.id} onClick={() => pickAvatar(a)}
                        className="rounded-2xl p-5 md:p-6 transition-all text-center group"
                        style={{
                          background: "linear-gradient(135deg, #dbeafe 0%, #f3ccff 100%)",
                          border: "3px solid #fff",
                          boxShadow: "0 10px 28px -10px rgba(99,102,241,0.4), inset 0 0 0 2px rgba(255,255,255,0.5)"
                        }}>
                  <div className="avatar-float w-24 h-24 md:w-28 md:h-28 rounded-3xl flex items-center justify-center text-6xl md:text-7xl mx-auto shadow-xl"
                       style={{background:"#fff",border:"2px solid rgba(99,102,241,0.2)"}}>
                    {a.emoji}
                  </div>
                  <div className="mt-4 font-display text-2xl font-extrabold">{a.name}</div>
                  <div className="text-xs text-[var(--ink-soft)] mt-1">{a.role}</div>
                  <div className="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full font-display text-xs font-bold tracking-wider text-white transition-transform group-hover:scale-105"
                       style={{background:"linear-gradient(135deg,var(--lvl2-a),var(--lvl2-b))",boxShadow:"0 8px 20px -8px rgba(14,165,233,0.6)"}}>
                    CHOOSE {a.name.toUpperCase()} <Icon name="arrow-right" className="w-3.5 h-3.5"/>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ---- BRIEFING ---- */
  if (phase === "briefing") {
    const briefing = fillAvatar(scenario.briefingTpl, avatar);
    return (
      <div className="scene-enter max-w-3xl mx-auto px-4 md:px-8 py-8">
        <div className="card-soft p-4 mb-5 flex items-center gap-4">
          <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white shrink-0" style={{background:"linear-gradient(135deg,var(--lvl2-a),var(--lvl2-b))"}}>
            <Icon name="eye" className="w-5 h-5"/>
          </div>
          <div className="flex-1">
            <div className="font-display font-bold">Level 2 · The Character Mirror</div>
            <div className="text-xs text-[var(--ink-soft)]">Briefing</div>
          </div>
        </div>

        <div className="card p-6 md:p-10 text-center relative overflow-hidden">
          <div className="orb absolute -top-10 -left-10 w-72 h-72" style={{background:"#d7e4ff",opacity:0.7}}/>
          <div className="orb absolute -bottom-16 -right-10 w-64 h-64" style={{background:"#f3ccff",opacity:0.6,animationDelay:"-8s"}}/>
          <div className="relative">
            <div className="avatar-pop inline-block">
              <div className="avatar-float w-28 h-28 md:w-32 md:h-32 rounded-3xl flex items-center justify-center text-6xl md:text-7xl mx-auto shadow-xl halo"
                   style={{background:"linear-gradient(135deg, #dbeafe, #e0e7ff)",border:"3px solid #fff"}}>
                {avatar.emoji}
              </div>
            </div>
            <h2 className="font-display text-3xl md:text-4xl font-extrabold mt-6">Meet <span className="text-gradient">{avatar.name}</span></h2>
            <div className="text-sm text-[var(--ink-soft)] mt-1">{avatar.role}</div>
            <p className="text-[15px] md:text-base text-[var(--ink)] leading-relaxed mt-6 max-w-xl mx-auto situation-reveal">{briefing}</p>
            <div className="mt-6 inline-flex items-center gap-2 chip text-sm px-4 py-2" style={{background:"rgba(99,102,241,0.1)",color:"#3730a3",borderColor:"rgba(99,102,241,0.25)"}}>
              <Icon name="target" className="w-4 h-4"/>
              <span className="font-semibold">{scenario.instruction}</span>
            </div>
            <div className="mt-6 flex items-center justify-center gap-3">
              <button onClick={() => setPhase("avatar")} className="btn-ghost px-4 py-2 text-xs">
                ← Change character
              </button>
              <button onClick={beginPlaying} className="btn-primary px-8 py-3.5 font-display text-base flex items-center gap-2"
                      style={{background:"linear-gradient(135deg,var(--lvl2-a),var(--lvl2-b))",boxShadow:"0 14px 32px -10px rgba(14,165,233,0.6)"}}>
                <Icon name="play" className="w-4 h-4"/> Begin Mirror
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ---- DONE ---- */
  if (phase === "done") {
    return (
      <div className="scene-enter max-w-2xl mx-auto px-4 md:px-8 py-16 text-center">
        <div className="halo inline-block rounded-3xl mb-5">
          <div className="w-24 h-24 rounded-3xl flex items-center justify-center text-white pop-in text-5xl"
               style={{background:"linear-gradient(135deg,var(--lvl2-a),var(--lvl2-b))",boxShadow:"0 20px 50px -10px rgba(14,165,233,0.6)"}}>
            ✨
          </div>
        </div>
        <h2 className="font-display text-3xl md:text-4xl font-extrabold">Mirror Complete</h2>
        <p className="text-[var(--ink-soft)] mt-2">Your identity signature has been captured.</p>
      </div>
    );
  }

  /* ---- PLAYING ---- */
  const card = deck[cardIdx];
  const cardText = fillAvatar(card.text, avatar);
  const dimPretty = card.dimension === "accountability" ? "Accountability" : card.dimension === "actionOrientation" ? "Action Orientation" : "Perseverance";
  const mostCount  = decisions.filter(d => d.decision === "most").length;
  const leastCount = decisions.filter(d => d.decision === "least").length;
  const showPill = cardIdx > 0;

  return (
    <div key={cardKey} className="scene-slide-in max-w-5xl mx-auto px-4 md:px-8 py-6">
      {showPill && <SceneChangePill key={cardKey} idx={cardIdx} total={deck.length} label="Card" colorA="#0ea5e9" colorB="#6366f1"/>}
      <div className="card-soft p-4 mb-5 flex items-center gap-4">
        <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white shrink-0" style={{background:"linear-gradient(135deg,var(--lvl2-a),var(--lvl2-b))"}}>
          <Icon name="eye" className="w-5 h-5"/>
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-display font-bold">Level 2 · Character Mirror</span>
            <span className="chip" style={{background:"rgba(14,165,233,0.08)",color:"#075985",borderColor:"rgba(14,165,233,0.3)"}}>Card {cardIdx+1} / {deck.length}</span>
          </div>
          <div className="mt-1.5 h-1.5 w-full rounded-full bg-[var(--line-2)] overflow-hidden">
            <div className="h-full rounded-full" style={{width:((cardIdx/deck.length)*100)+"%",background:"linear-gradient(90deg,var(--lvl2-a),var(--lvl2-b))",transition:"width .4s ease"}}/>
          </div>
        </div>
        <CircularTimer value={timeLeft} max={L2_CARD_TIMER} colors={["#0ea5e9","#6366f1"]}/>
      </div>

      <div className="mb-5 flex items-center justify-center gap-3 flex-wrap">
        <div className="chip text-sm px-3.5 py-1.5" style={{background:"rgba(16,185,129,0.10)",color:"#065f46",borderColor:"rgba(16,185,129,0.3)"}}>
          <span className="text-base">🧲</span>
          <span className="font-semibold">More Like Me</span>
          <span className="ml-1 tabular">· {mostCount}</span>
        </div>
        <div className="chip text-sm px-3.5 py-1.5" style={{background:"rgba(249,115,22,0.10)",color:"#9a3412",borderColor:"rgba(249,115,22,0.3)"}}>
          <span className="text-base">✕</span>
          <span className="font-semibold">Less Like Me</span>
          <span className="ml-1 tabular">· {leastCount}</span>
        </div>
      </div>

      <div key={cardKey} className="card p-5 md:p-8 relative overflow-hidden mb-6 scene-enter">
        <div className="orb absolute -top-10 -right-10 w-60 h-60" style={{background:"#d7e4ff",opacity:0.55}}/>
        <div className="relative flex items-start gap-5">
          <div className="shrink-0 avatar-pop">
            <div className="avatar-float w-20 h-20 md:w-24 md:h-24 rounded-3xl flex items-center justify-center text-5xl md:text-6xl shadow-lg"
                 style={{background:"linear-gradient(135deg, #dbeafe, #e0e7ff)",border:"3px solid #fff"}}>
              {avatar.emoji}
            </div>
          </div>
          <div className="flex-1">
            <div className="flex items-center gap-2">
              <span className="font-display font-bold">{avatar.name}</span>
              <span className="text-xs text-[var(--ink-mute)]">· {avatar.role}</span>
              <span className="talking-dots ml-1" aria-hidden><span/><span/><span/></span>
            </div>
            <div className="mt-1 text-[10px] font-bold tracking-[0.2em] uppercase" style={{color:"var(--lvl2-a)"}}>{dimPretty}</div>
            <p className="text-[15px] md:text-[17px] text-[var(--ink)] leading-relaxed mt-3 situation-reveal">"{cardText}"</p>
          </div>
        </div>
      </div>

      <div className="grid sm:grid-cols-2 gap-3">
        <button onClick={()=>recordDecision("most")} disabled={logging}
                className="rounded-2xl p-5 md:p-6 text-left transition-all"
                style={{background:"linear-gradient(135deg, #ecfdf5, #fff)",border:"2px solid #10b981",boxShadow:"0 10px 28px -10px rgba(16,185,129,0.4)"}}>
          <div className="flex items-center gap-3">
            <div className="text-3xl md:text-4xl">🧲</div>
            <div className="flex-1">
              <div className="font-display font-bold text-base md:text-lg" style={{color:"#065f46"}}>More Like Me</div>
              <div className="text-xs mt-0.5" style={{color:"#047857"}}>this is part of my execution style</div>
            </div>
            <Icon name="arrow-right" className="w-5 h-5" stroke={2.4} style={{color:"#10b981"}}/>
          </div>
        </button>
        <button onClick={()=>recordDecision("least")} disabled={logging}
                className="rounded-2xl p-5 md:p-6 text-left transition-all"
                style={{background:"linear-gradient(135deg, #fff7ed, #fff)",border:"2px solid #f97316",boxShadow:"0 10px 28px -10px rgba(249,115,22,0.4)"}}>
          <div className="flex items-center gap-3">
            <div className="text-3xl md:text-4xl">✕</div>
            <div className="flex-1">
              <div className="font-display font-bold text-base md:text-lg" style={{color:"#9a3412"}}>Less Like Me</div>
              <div className="text-xs mt-0.5" style={{color:"#b45309"}}>this isn't part of how I work</div>
            </div>
            <Icon name="arrow-right" className="w-5 h-5" stroke={2.4} style={{color:"#f97316"}}/>
          </div>
        </button>
      </div>

      <div className="mt-4 flex items-center justify-between gap-3">
        <div className="text-xs text-[var(--ink-mute)]">Each card is independent. Timer auto-skips if you don't decide.</div>
        <button onClick={()=>recordDecision(null)} disabled={logging} className="btn-ghost px-4 py-1.5 text-xs flex items-center gap-1.5">
          Skip card <Icon name="arrow-right" className="w-3.5 h-3.5"/>
        </button>
      </div>
    </div>
  );
}

/* ============ LEVEL 3 — STRATEGIST (Square-box sequential click) ============ */
function Level3Screen({ idx, total: scenarioTotal, scenario, timeLeft, onSubmit, logging, progressPct }) {
  // rankMap: { optionId: 1 | 2 | 3 } — each option either has a rank or doesn't.
  // Clicking an unranked option assigns the next available rank; clicking a
  // ranked option removes its rank (leaving a gap that the next click fills).
  const [rankMap, setRankMap] = useState({});
  useEffect(() => { setRankMap({}); }, [scenario.id]);

  const RANK_COLOR = { 1: "#d97706", 2: "#64748b", 3: "#b45309" };  // gold / slate / bronze
  const RANK_LABEL = { 1: "1st", 2: "2nd", 3: "3rd" };

  const rankOf = (optId) => rankMap[optId] || null;

  const toggle = (optId) => {
    if (logging) return;
    setRankMap(prev => {
      const next = { ...prev };
      if (next[optId]) { delete next[optId]; return next; }  // un-rank
      // Find lowest available rank (1, then 2, then 3)
      for (let r = 1; r <= 3; r++) {
        if (!Object.values(next).includes(r)) { next[optId] = r; return next; }
      }
      return next;  // all three taken — do nothing
    });
  };

  const submit = () => {
    const ordered = [1,2,3].map(r => {
      const optId = Object.keys(rankMap).find(k => rankMap[k] === r);
      return scenario.options.findIndex(o => o.id === optId);
    });
    onSubmit(ordered);
  };

  const assignedCount = Object.keys(rankMap).length;
  const allAssigned = assignedCount === 3;
  const nextRank = (() => { for (let r = 1; r <= 3; r++) if (!Object.values(rankMap).includes(r)) return r; return null; })();

  const { show: showPill, pillKey } = useScenePill(idx || 0);

  return (
    <div key={scenario.id} className="scene-slide-in max-w-3xl mx-auto px-4 md:px-8 py-6">
      {showPill && <SceneChangePill key={pillKey} idx={idx || 0} total={scenarioTotal || 1} label="Puzzle" colorA="#f59e0b" colorB="#f97316"/>}
      <div className="card-soft p-4 mb-5 flex items-center gap-4">
        <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white shrink-0" style={{background:"linear-gradient(135deg,var(--lvl3-a),var(--lvl3-b))"}}>
          <Icon name="chess" className="w-5 h-5"/>
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-display font-bold">Level 3 · Strategist</span>
            <span className="chip" style={{background:"#fff7ed",color:"#9a3412",borderColor:"#fed7aa"}}>Puzzle {(idx||0)+1} / {scenarioTotal||1}</span>
          </div>
          <div className="mt-1.5 h-1.5 w-full rounded-full bg-[var(--line-2)] overflow-hidden">
            <div className="h-full rounded-full" style={{width:progressPct+"%",background:"linear-gradient(90deg,var(--lvl3-a),var(--lvl3-b))",transition:"width .6s cubic-bezier(.2,.8,.2,1)"}}/>
          </div>
        </div>
        <CircularTimer value={timeLeft} max={L3_TIMER} colors={["#f59e0b","#f97316"]}/>
      </div>

      {/* Situation */}
      <div className="card p-5 md:p-6 mb-5 relative overflow-hidden">
        <div className="orb absolute -bottom-16 -right-10 w-60 h-60" style={{background:"#ffe0bf",opacity:0.55}}/>
        <div className="relative">
          <div className="flex items-center gap-2 mb-2">
            <Icon name="target" className="w-4 h-4 text-[var(--lvl3-a)]"/>
            <div className="text-xs font-bold tracking-widest text-[var(--lvl3-a)] uppercase">Strategic Choice</div>
          </div>
          <div className="text-base md:text-lg leading-relaxed">{scenario.situation}</div>
        </div>
      </div>

      {/* How-to prompt */}
      <div className="mb-4 flex items-center justify-center">
        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full font-semibold text-sm"
             style={{
               background: allAssigned ? "rgba(16,185,129,0.12)" : "rgba(245,158,11,0.1)",
               color: allAssigned ? "#065f46" : "#92400e",
               border: `1px solid ${allAssigned ? "rgba(16,185,129,0.3)" : "rgba(245,158,11,0.3)"}`
             }}>
          <Icon name={allAssigned?"check":"target"} className="w-4 h-4"/>
          {allAssigned
            ? "All three priorities set — lock it in"
            : `Tap options in priority order — next click becomes ${RANK_LABEL[nextRank]}`}
        </div>
      </div>

      {/* Options — square rank indicator on left, text on right */}
      <div className="space-y-3">
        {scenario.options.map((opt, i) => {
          const rank = rankOf(opt.id);
          const isRanked = rank !== null;
          const color = isRanked ? RANK_COLOR[rank] : null;
          return (
            <button key={opt.id} onClick={() => toggle(opt.id)} disabled={logging}
                    className="w-full text-left rounded-2xl transition-all flex items-center gap-4 p-4 md:p-5 relative"
                    style={{
                      background: isRanked ? "#fff" : "#fff",
                      border: `2px solid ${isRanked ? color : "rgba(30,39,70,0.1)"}`,
                      boxShadow: isRanked
                        ? `0 0 0 2px ${color}22, 0 14px 28px -10px ${color}55`
                        : "0 2px 8px -4px rgba(30,39,70,0.08)",
                      cursor: logging ? "not-allowed" : "pointer"
                    }}>
              {/* Square rank indicator */}
              <div className="shrink-0 w-14 h-14 md:w-16 md:h-16 rounded-xl flex items-center justify-center transition-all"
                   style={{
                     background: isRanked ? `linear-gradient(135deg, #fff 0%, ${color}1a 100%)` : "#f8fafc",
                     border: `2px solid ${isRanked ? color : "#e5e7eb"}`,
                     boxShadow: isRanked
                       ? `inset 0 0 20px ${color}22, 0 0 18px ${color}66, 0 0 0 4px ${color}10`
                       : "inset 0 2px 4px rgba(30,39,70,0.04)"
                   }}>
                {isRanked ? (
                  <span className="font-display text-3xl md:text-4xl font-black tabular"
                        style={{ color: color, textShadow: `0 0 14px ${color}cc, 0 0 28px ${color}66` }}>
                    {rank}
                  </span>
                ) : (
                  <span className="text-3xl md:text-4xl font-light text-[#cbd5e1]">—</span>
                )}
              </div>
              {/* Option text */}
              <div className="flex-1 text-[14px] md:text-[15px] leading-relaxed text-[var(--ink)]">
                {opt.text}
              </div>
            </button>
          );
        })}
      </div>

      <div className="mt-5 text-xs text-[var(--ink-soft)] text-center">
        Tap any ranked option to un-rank it.
      </div>

      <div className="mt-6 flex items-center justify-end">
        <button onClick={submit} disabled={!allAssigned || logging} className="btn-primary px-7 py-3 font-display flex items-center gap-2"
                style={allAssigned ? {background:"linear-gradient(135deg,var(--lvl3-a),var(--lvl3-b))", boxShadow:"0 14px 30px -8px rgba(245,158,11,0.6)"} : undefined}>
          <Icon name="check" className="w-4 h-4"/> Lock In Priority
        </button>
      </div>
    </div>
  );
}

/* ============ LEVEL 4 — MASTERMIND ============ */
function Level4Screen({ idx, total, question, timeLeft, onSelect, logging, lastPicked, progressPct }) {
  const { show: showPill, pillKey } = useScenePill(idx);
  return (
    <div key={question.id} className="scene-slide-in max-w-5xl mx-auto px-4 md:px-8 py-6">
      {showPill && <SceneChangePill key={pillKey} idx={idx} total={total} label="Reflection" colorA="#a855f7" colorB="#ec4899"/>}
      <div className="card-soft p-4 mb-5 flex items-center gap-4">
        <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white shrink-0" style={{background:"linear-gradient(135deg,var(--lvl4-a),var(--lvl4-b))"}}>
          <Icon name="key" className="w-5 h-5"/>
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-display font-bold">Level 4 · Mastermind</span>
            <span className="chip" style={{background:"#fdf4ff",color:"#86198f",borderColor:"#f0abfc"}}>Reflection {idx+1} / {total}</span>
          </div>
          <div className="mt-1.5 h-1.5 w-full rounded-full bg-[var(--line-2)] overflow-hidden">

/* ============ CONFETTI ============ */
function ConfettiBurst({ show, colors=["#10b981","#0ea5e9","#f59e0b","#a855f7","#ec4899"] }) {
  const parts = useMemo(() => {
    if (!show) return [];
    return Array.from({length:80}, (_,i) => ({
      id:i, angle:Math.random()*Math.PI*2, dist:180+Math.random()*400,
      delay:Math.random()*0.3, duration:1.4+Math.random()*1.6,
      size:5+Math.random()*8, color:colors[Math.floor(Math.random()*colors.length)]
    }));
  }, [show]);
  if (!show) return null;
  return (
    <div className="pointer-events-none fixed inset-0 flex items-start justify-center z-40">
      <style>{`@keyframes cfly { 0%{transform:translate(0,0) rotate(0deg);opacity:1;} 100%{transform:translate(var(--tx), var(--ty)) rotate(900deg);opacity:0;} }`}</style>
      <div className="relative top-[22vh]">
        {parts.map(p => {
          const tx = Math.cos(p.angle)*p.dist, ty = Math.sin(p.angle)*p.dist+160;
          return <span key={p.id} style={{ position:"absolute", width:p.size, height:p.size, background:p.color, borderRadius:Math.random()>0.5?"3px":"9999px", boxShadow:`0 0 10px ${p.color}99`, animation:`cfly ${p.duration}s cubic-bezier(.1,.7,.2,1) ${p.delay}s forwards`, ["--tx"]:`${tx}px`, ["--ty"]:`${ty}px` }}/>;
        })}
      </div>
    </div>
  );
}

function DimBar({ label, value, delay=0 }) {
  const [ready,setReady] = useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setReady(true),delay); return ()=>clearTimeout(t); },[delay]);
  const v = useCountUp(value, 1200, ready);
  const pct = Math.max(0,Math.min(100,(v/4)*100));
  const color = value>=3?"#10b981":value>=2?"#f59e0b":"#ef4444";
  return (
    <div>
      <div className="flex justify-between items-end mb-2">
        <span className="text-sm font-semibold">{label}</span>
        <div className="flex items-baseline gap-1.5">
          <span className="text-lg font-extrabold tabular" style={{color}}>{v.toFixed(2)}</span>
          <span className="text-xs text-[var(--ink-mute)] tabular">/ 4.00</span>
        </div>

      <div className="h-2.5 rounded-full overflow-hidden bg-[var(--line-2)]">
        <div className="h-full rounded-full relative" style={{width:pct+"%",background:`linear-gradient(90deg, ${color}cc, ${color})`,transition:"width 1.2s cubic-bezier(.2,.8,.2,1)",boxShadow:`0 0 10px ${color}66`}}>
          <div className="absolute inset-0 progress-shimmer opacity-50"/>
        </div>
      </div>
    </div>
  );
}

              <span className="chip" style={flags.length?{background:"rgba(245,158,11,0.12)",color:"#92400e",borderColor:"rgba(245,158,11,0.3)"}:{background:"rgba(16,185,129,0.12)",color:"#065f46",borderColor:"rgba(16,185,129,0.3)"}}>{flags.length?`${flags.length} flagged`:"Clean"}</span>
            </div>
            <div className="flex items-center justify-between"><span className="text-sm text-[var(--ink-soft)]">Pattern</span>
              <span className="chip" style={{background:"rgba(99,102,241,0.08)",color:"#3730a3",borderColor:"rgba(99,102,241,0.25)"}}>{candidate.meta.avgResponseMs<4500?"Snap decisions":candidate.meta.avgResponseMs>8000?"Deliberate":"Balanced"}</span>
            </div>
          </div>
        </div>
      </div>

      <div className="grid md:grid-cols-2 gap-5 mb-5">
        <div className="card p-5 md:p-6 relative overflow-hidden">
          <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full" style={{background:"#10b98122",filter:"blur(30px)"}}/>
          <div className="relative">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white" style={{background:"linear-gradient(135deg,#10b981,#06b6d4)"}}><Icon name="bolt" className="w-5 h-5"/></div>
              <div className="font-extrabold text-lg" style={{color:"#10b981"}}>Strengths</div>
            </div>
            <div className="text-sm leading-relaxed">
              <div className="font-semibold mb-1">{DIMENSION_LABEL[strongest]}</div>
              {STRENGTH_NOTE[strongest]}
            </div>
          </div>
        </div>
        <div className="card p-5 md:p-6 relative overflow-hidden">
          <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full" style={{background:"#f59e0b22",filter:"blur(30px)"}}/>
          <div className="relative">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white" style={{background:"linear-gradient(135deg,#f59e0b,#f97316)"}}><Icon name="target" className="w-5 h-5"/></div>
              <div className="font-extrabold text-lg" style={{color:"#b45309"}}>Development Area</div>
            </div>
            <div className="text-sm leading-relaxed">
              <div className="font-semibold mb-1">{DIMENSION_LABEL[weakest]}</div>
              {DEV_TIP[weakest]}
            </div>
          </div>
        </div>
      </div>

      <div className="card p-5 md:p-6 mb-6">
        <div className="flex items-center gap-2 mb-3">
          <Icon name="sparkles" className="w-5 h-5 text-[var(--lvl4-a)]"/>
          <div className="font-extrabold text-lg">Behavioral Summary</div>
        </div>
        <p className="leading-relaxed">{LEVEL_SUMMARY[candidate.level]}</p>
      </div>

      <div className="flex flex-wrap gap-3">
        <button onClick={onBack} className="btn-ghost px-5 py-3 font-display text-sm flex items-center gap-2"><Icon name="arrow-right" className="w-4 h-4 rotate-180"/> Back to List</button>
        <button onClick={()=>window.print()} className="btn-primary px-5 py-3 font-display text-sm flex items-center gap-2"><Icon name="download" className="w-4 h-4"/> Export Report</button>
      </div>
    </div>
  );
}

/* ============ ROOT ============ */
function CatalystAdventure() {
  const params = new URLSearchParams(window.location.search);
  const initialRole = params.get("role")==="manager" ? "manager" : "candidate";

  const [role,setRole] = useState(initialRole);
  const [view,setView] = useState("intro");
  const [managerView,setManagerView] = useState("list");
  const [managerOpen,setManagerOpen] = useState(null);
  const [candidateName,setCandidateName] = useState("");

  const [l1Answers,setL1Answers] = useState([]);
  const [l2Answers,setL2Answers] = useState([]);
  const [l3Answers,setL3Answers] = useState([]);
  const [l4Answers,setL4Answers] = useState([]);
  const [l1Idx,setL1Idx] = useState(0);
  const [l2Idx,setL2Idx] = useState(0);
  const [l3Idx,setL3Idx] = useState(0);
  const [l4Idx,setL4Idx] = useState(0);
  const [l1Picked,setL1Picked] = useState(null);
  const [l4Picked,setL4Picked] = useState(null);

  const [timeLeft,setTimeLeft] = useState(L1_TIMER);
  const [logging,setLogging] = useState(false);
  const [skipping,setSkipping] = useState(false);
  const loggingRef = useRef(false);
  useEffect(()=>{ loggingRef.current = logging; },[logging]);
  const questionShownAt = useRef(0);
  useEffect(()=>{ questionShownAt.current = Date.now(); },[view,l1Idx,l2Idx,l3Idx,l4Idx]);
  const [savedCandidates,setSavedCandidates] = useState(() => mergeCandidates(loadSavedCandidates(), mockCandidates));

  const [toast,setToast] = useState(null);
  const toastId = useRef(0);
  const showToast = (message,tone="primary") => {
    toastId.current += 1;
    const id = toastId.current;
    setToast({ id, message, tone });
    setTimeout(()=>setToast(t=>(t&&t.id===id?null:t)), 2100);
  };

  const completedLevels = useMemo(() => {
    const d = [];
    if (l1Answers.length === L1.length) d.push(1);
    if (l2Answers.length === L2.length) d.push(2);
    if (l3Answers.length === L3.length) d.push(3);
    if (l4Answers.length === L4.length) d.push(4);
    return d;
  }, [l1Answers,l2Answers,l3Answers,l4Answers]);
  const currentLevelOnMap = completedLevels.length===0?1:completedLevels.length===1?2:completedLevels.length===2?3:completedLevels.length===3?4:null;
  const totalQ = L1.length + L2.length + L3.length + L4.length;
  const answered = l1Answers.length + l2Answers.length + l3Answers.length + l4Answers.length;
  const progressPct = (answered/totalQ)*100;

  /* LEVEL 1 */
  const submitL1 = useCallback((option, auto=false) => {
    if (loggingRef.current) return;
    const s = L1[l1Idx];
    const dt = Date.now() - questionShownAt.current;
    if (!auto) setL1Picked(option);
    setL1Answers(prev => [...prev, { id: s.id, dimension: s.dimension, level: option.level, choiceId: option.id, auto, responseMs: dt }]);
    setLogging(true);
    if (!auto) showToast("Move logged", "success");
    setTimeout(()=>{
      setLogging(false); setL1Picked(null);
      if (l1Idx+1 < L1.length) setL1Idx(l1Idx+1);
      else setView("level1-complete");
    }, LOG_MS);
  }, [l1Idx]);

  useEffect(()=>{
    if (view!=="level1" || logging || skipping) return;
    const start = Date.now(), duration = L1_TIMER*1000;
    setTimeLeft(L1_TIMER);
    let cancelled=false, fired=false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now()-start))/1000);
      setTimeLeft(rem);
      if (rem<=0 && !fired) {
        fired = true;
        setSkipping(true);
        setTimeout(() => {
          const s = L1[l1Idx];
          const lowest = [...s.options].sort((a,b)=>a.level-b.level)[0];
          submitL1(lowest, true);
          setSkipping(false);
        }, 1000);
      } else if (rem>0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, l1Idx, logging, skipping, submitL1]);

  /* LEVEL 2 — Character Mirror (9-card binary; timer managed in component) */
  const submitL2 = useCallback((result) => {
    if (loggingRef.current) return;
    const s = L2[l2Idx];
    setL2Answers(prev => [...prev, {
      id: s.id,
      avatar: result.avatar,
      decisions: result.decisions || [],
      auto: result.auto || false,
      responseMs: result.responseMs
    }]);
    setLogging(true);
    showToast(result.auto ? "Mirror skipped" : "Mirror complete", "primary");
    setTimeout(()=>{
      setLogging(false);
      if (l2Idx+1 < L2.length) setL2Idx(l2Idx+1);
      else setView("level2-complete");
    }, LOG_MS);
  }, [l2Idx]);

  /* LEVEL 3 — Rank */
  const submitL3 = useCallback((order, auto=false) => {
    if (loggingRef.current) return;
    const s = L3[l3Idx];
    const ordered = order.map(i=>s.options[i]);
    const dt = Date.now() - questionShownAt.current;
    setL3Answers(prev => [...prev, { id: s.id, dimension: s.dimension, rankings: ordered, auto, responseMs: dt }]);
    setLogging(true);
    showToast(auto?"Time up — order locked":"Priority locked in", auto?"warn":"purple");
    setTimeout(()=>{
      setLogging(false);
      if (l3Idx+1 < L3.length) setL3Idx(l3Idx+1);
      else setView("level3-complete");
    }, LOG_MS);
  }, [l3Idx]);

  useEffect(()=>{
    if (view!=="level3" || logging || skipping) return;
    const start = Date.now(), duration = L3_TIMER*1000;
    setTimeLeft(L3_TIMER);
    let cancelled=false, fired=false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now()-start))/1000);
      setTimeLeft(rem);
      if (rem<=0 && !fired) {
        fired = true;
        setSkipping(true);
        setTimeout(() => {
          const s = L3[l3Idx];
          submitL3(s.options.map((_,i)=>i), true);
          setSkipping(false);
        }, 1000);
      } else if (rem>0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, l3Idx, logging, skipping, submitL3]);

  /* LEVEL 4 — Why (with 20s timer per question) */
  const submitL4 = useCallback((opt, auto=false) => {
    if (loggingRef.current) return;
    const q = L4[l4Idx];
    const dt = Date.now() - questionShownAt.current;
    if (!auto) setL4Picked(opt);
    setL4Answers(prev => [...prev, { id: q.id, dimension: q.dimension, level: opt.level, choiceId: opt.id, auto, responseMs: dt }]);
    setLogging(true);
    if (!auto) showToast("Reflection saved", "purple");
    setTimeout(()=>{
      setLogging(false); setL4Picked(null);
      if (l4Idx+1 < L4.length) setL4Idx(l4Idx+1);
      else setView("level4-complete");
    }, LOG_MS);
  }, [l4Idx]);

  useEffect(()=>{
    if (view!=="level4" || logging || skipping) return;
    const start = Date.now(), duration = L4_TIMER*1000;
    setTimeLeft(L4_TIMER);
    let cancelled=false, fired=false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now()-start))/1000);
      setTimeLeft(rem);
      if (rem<=0 && !fired) {
        fired = true;
        setSkipping(true);
        setTimeout(() => {
          const q = L4[l4Idx];
          const lowest = [...q.options].sort((a,b)=>a.level-b.level)[0];
          submitL4(lowest, true);
          setSkipping(false);
        }, 1000);
      } else if (rem>0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, l4Idx, logging, skipping, submitL4]);

  /* RESULTS */
  const result = useMemo(()=>{
    if (!(l1Answers.length===L1.length && l2Answers.length===L2.length && l3Answers.length===L3.length && l4Answers.length===L4.length)) return null;
    return computeResults(l1Answers, l2Answers, l3Answers, l4Answers);
  }, [l1Answers,l2Answers,l3Answers,l4Answers]);

  useEffect(()=>{
    if (!result || !candidateName) return;
    const id = "self-" + candidateName.toLowerCase().replace(/\s+/g,"-") + "-" + Date.now();
    const today = new Date().toISOString().slice(0,10);
    const entry = { id, name: candidateName, date: today, score: result.finalScore, level: result.level,
                    status: "Pending", dims: result.dimScores, meta: { ...result.meta }, answers: null };
    // Persist to localStorage
    saveCandidate(entry);
    // Reflect in current in-memory list (dedupe by name so restart overwrites)
    setSavedCandidates(prev => {
      const key = "self-" + candidateName.toLowerCase().replace(/\s+/g,"-");
      const filtered = prev.filter(c => !c.id.startsWith(key));
      return [entry, ...filtered];
    });
  }, [result, candidateName]);

  const restart = () => {
    setL1Answers([]); setL2Answers([]); setL3Answers([]); setL4Answers([]);
    setL1Idx(0); setL2Idx(0); setL3Idx(0); setL4Idx(0); setL4Picked(null);
    setCandidateName(""); setView("intro"); setRole("candidate");
  };
  const toggleRole = () => { if (role==="candidate") { setRole("manager"); setManagerView("list"); } else setRole("candidate"); };
  const onHome = () => { if (role==="manager") { setManagerView("list"); setManagerOpen(null); } };

  let body = null;
  if (role==="manager") {
    const inner = managerView==="list"
      ? <ManagerListView candidates={savedCandidates} onOpen={(c)=>{setManagerOpen(c);setManagerView("report");}} onBack={()=>setRole("candidate")}/>
      : <ManagerReportView candidate={managerOpen} onBack={()=>{setManagerView("list");setManagerOpen(null);}}/>;
    body = <div className="manager-scope">{inner}</div>;
  } else {
    switch (view) {
      case "intro":           body = <Intro onStart={(n)=>{setCandidateName(n);setView("journey");}}/>; break;
      case "journey":         body = <JourneyMap currentLevel={currentLevelOnMap} completed={completedLevels} candidateName={candidateName}
                                        onEnter={(n)=>{ if(n==="reveal"){setView("candidate-results");return;} setView(`level${n}-intro`); }}/>; break;
      case "level1-intro":    body = <LevelIntro levelNum={1} onBegin={()=>setView("level1")}/>; break;
      case "level1":          body = <Level1Screen idx={l1Idx} total={L1.length} scenario={L1[l1Idx]} timeLeft={timeLeft} onSelect={submitL1} logging={logging} lastPicked={l1Picked}
                                        progressPct={((l1Idx+(l1Picked?1:0))/L1.length)*100}/>; break;
      case "level1-complete": body = <LevelCompleteView levelNum={1} candidateName={candidateName} onContinue={()=>setView("journey")}/>; break;
      case "level2-intro":    body = <LevelIntro levelNum={2} onBegin={()=>setView("level2")}/>; break;
      case "level2":          body = <Level2Screen scenario={L2[l2Idx]} onSubmit={submitL2} logging={logging}
                                        progressPct={(l2Idx/L2.length)*100}/>; break;
      case "level2-complete": body = <LevelCompleteView levelNum={2} candidateName={candidateName} onContinue={()=>setView("journey")}/>; break;
      case "level3-intro":    body = <LevelIntro levelNum={3} onBegin={()=>setView("level3")}/>; break;
      case "level3":          body = <Level3Screen idx={l3Idx} total={L3.length} scenario={L3[l3Idx]} timeLeft={timeLeft} onSubmit={(o)=>submitL3(o,false)} logging={logging}
                                        progressPct={(l3Idx/L3.length)*100}/>; break;
      case "level3-complete": body = <LevelCompleteView levelNum={3} candidateName={candidateName} onContinue={()=>setView("journey")}/>; break;
      case "level4-intro":    body = <LevelIntro levelNum={4} onBegin={()=>setView("level4")}/>; break;
      case "level4":          body = <Level4Screen idx={l4Idx} total={L4.length} question={L4[l4Idx]} timeLeft={timeLeft} onSelect={submitL4} logging={logging} lastPicked={l4Picked}
                                        progressPct={((l4Idx+(l4Picked?1:0))/L4.length)*100}/>; break;
      case "level4-complete": body = <LevelCompleteView levelNum={4} candidateName={candidateName} onContinue={()=>setView("journey")}/>; break;
      case "candidate-results": body = result ? <CandidateFinalView name={candidateName} result={result} onRestart={restart}
                                        onPortal={()=>{setRole("manager");setManagerView("list");}}/> : null; break;
    }
  }

  return (
    <div className="relative min-h-screen">
      <AmbientOrbs/>
      <div className="relative z-10">
        <AppHeader role={role} onToggleRole={toggleRole} onHome={onHome}
                   progressPct={role==="candidate"&&view!=="intro"?progressPct:null}
                   candidateName={role==="candidate"&&view!=="intro"?candidateName:null}/>
        {body}
        <div className="max-w-6xl mx-auto px-4 md:px-8 mt-12 pt-6 text-xs text-[var(--ink-mute)] flex justify-between items-center flex-wrap gap-3">
          <span className="font-mono">catalyst-quest · adventure · v1.0 · 4-level</span>
          <span className="flex items-center gap-2">
            <a href="index.html" className="underline hover:text-[var(--primary)]">← Switch theme</a>
            <span>·</span>
            <span className="flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-[var(--success)] animate-pulse inline-block"/> demo only</span>
          </span>
        </div>
      </div>
      {toast && <Toast key={toast.id} message={toast.message} tone={toast.tone}/>}
      {skipping && <SkipOverlay/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CatalystAdventure/>);
</script>
</body>
</html>
