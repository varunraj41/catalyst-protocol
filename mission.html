<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signature Sprint // Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="catalyst-shared.js"></script>
<style>
  :root {
    --bg:#04060e; --bg-2:#0a0f1e;
    --elec:#4d9fff; --purple:#b388ff; --green:#4ade80; --cyan:#22d3ee;
    --amber:#fbbf24; --danger:#f87171;
    --ink:#e6ebf5; --ink-soft:#9aa3bd; --ink-mute:#6b7388;
    --glass: rgba(13,20,40,0.6); --glass-2: rgba(10,15,28,0.75);
    --border: rgba(255,255,255,0.08); --border-2: rgba(77,159,255,0.25);
  }
  * { box-sizing: border-box; }
  html, body, #root {
    background: radial-gradient(900px 500px at 10% 0%, rgba(77,159,255,0.14), transparent 60%),
                radial-gradient(900px 500px at 100% 100%, rgba(179,136,255,0.12), transparent 60%), var(--bg);
    background-attachment: fixed; min-height: 100%;
  }
  body { margin: 0; font-family: 'Inter', sans-serif; color: var(--ink); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: 'Orbitron','Inter',sans-serif; letter-spacing: 0.01em; }
  .font-mono    { font-family: 'JetBrains Mono', monospace; }
  .glow-elec { text-shadow: 0 0 10px #4d9fffaa, 0 0 28px #4d9fff55; }
  .glow-green{ text-shadow: 0 0 10px #4ade80aa, 0 0 28px #4ade8055; }
  .glow-purple{text-shadow: 0 0 10px #b388ffaa, 0 0 28px #b388ff55; }

  .glass { background: var(--glass); backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05); border-radius: 8px; }
  .glass-strong { background: var(--glass-2); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--border-2); border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07); }

  .btn-primary { background: linear-gradient(135deg, var(--elec), var(--purple)); color:#fff; font-weight:700;
    letter-spacing: 0.12em; border: none; border-radius: 4px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 10px 36px -8px rgba(77,159,255,0.7), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: all .3s cubic-bezier(.2,.8,.2,1); position: relative; overflow: hidden; }
  .btn-primary::before { content:""; position:absolute; inset:0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-100%); animation: shimmer 3.2s infinite; }
  @keyframes shimmer { 0%{transform:translateX(-100%);} 55%,100%{transform:translateX(120%);} }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px) scale(1.015);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 18px 54px -8px rgba(77,159,255,0.95), inset 0 1px 0 rgba(255,255,255,0.4); }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
  .btn-ghost { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--ink);
    border-radius: 4px; transition: all .25s; font-weight:600; letter-spacing: .08em; }
  .btn-ghost:hover { border-color: var(--elec); color: var(--elec); background: rgba(77,159,255,0.08); }

  /* 3D option card — elevated glass with inset highlights */
  .opt {
    position: relative;
    background: linear-gradient(180deg, rgba(18,25,48,0.72) 0%, rgba(10,15,28,0.82) 100%);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    transition: transform .28s cubic-bezier(.2,.8,.2,1), box-shadow .28s, border-color .2s, background .2s;
    overflow: hidden; text-align: left; width: 100%; color: var(--ink);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 -1px 0 rgba(0,0,0,0.4) inset,
      0 2px 0 rgba(0,0,0,0.5),
      0 8px 22px -4px rgba(0,0,0,0.55),
      0 14px 32px -8px rgba(77,159,255,0.12);
  }
  .opt::before { content:""; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(77,159,255,0.08), rgba(179,136,255,0.08)); opacity:0; transition: opacity .3s; pointer-events:none; }
  .opt:hover:not(:disabled) {
    transform: translateY(-4px);
    border-color: rgba(77,159,255,0.55);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.12) inset,
      0 -1px 0 rgba(0,0,0,0.4) inset,
      0 3px 0 rgba(77,159,255,0.35),
      0 22px 44px -12px rgba(77,159,255,0.6),
      0 14px 26px -6px rgba(0,0,0,0.6);
  }
  .opt:hover:not(:disabled)::before { opacity: 1; }
  .opt:active:not(:disabled) {
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 -1px 0 rgba(0,0,0,0.4) inset,
      0 1px 0 rgba(77,159,255,0.25),
      0 10px 24px -6px rgba(77,159,255,0.4);
  }
  .opt.active, .opt.most {
    border-color: var(--green);
    background: linear-gradient(180deg, rgba(74,222,128,0.12) 0%, rgba(18,25,48,0.82) 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 -1px 0 rgba(0,0,0,0.4) inset,
      0 3px 0 rgba(74,222,128,0.35),
      0 0 0 1px var(--green),
      0 0 48px -6px rgba(74,222,128,0.55);
    animation: pulse-pick .8s ease-out;
  }
  @keyframes pulse-pick { 0%{box-shadow:0 0 0 1px var(--green), 0 0 0 0 rgba(74,222,128,.5);} 100%{box-shadow:0 0 0 1px var(--green), 0 0 48px -6px rgba(74,222,128,.55);} }

  /* Skip overlay — mission dark */
  .skip-overlay { position: fixed; inset: 0; z-index: 80; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 50%, rgba(248,113,113,0.15), rgba(4,6,14,0.92));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    animation: skipFade 1.1s ease-out forwards; }
  @keyframes skipFade { 0%{opacity:0;} 15%{opacity:1;} 85%{opacity:1;} 100%{opacity:0;} }
  .skip-icon { animation: skipIcon 1.1s cubic-bezier(.2,1.6,.2,1) forwards; display: inline-block; filter: drop-shadow(0 0 24px rgba(251,191,36,0.8)); }
  @keyframes skipIcon { 0%{transform:scale(0.2) rotate(-20deg);opacity:0;} 40%{transform:scale(1.2) rotate(8deg);opacity:1;} 70%{transform:scale(1) rotate(-4deg);} 100%{transform:scale(1) rotate(0);} }
  .skip-text { animation: skipText 1.1s cubic-bezier(.2,1,.2,1) both; animation-delay: 0.1s; }
  @keyframes skipText { 0%{opacity:0;transform:translateY(12px);letter-spacing:0.5em;} 60%{opacity:1;transform:translateY(0);letter-spacing:0.1em;} 100%{opacity:1;} }
  .skip-scan { position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, rgba(248,113,113,0.15) 50%, transparent 100%);
    animation: skipScan 1.1s ease-out forwards; }
  @keyframes skipScan { 0%{transform:translateY(-100%);} 100%{transform:translateY(100%);} }

  /* Observer L2 entrance */
  .avatar-pop { animation: avatarPop .8s cubic-bezier(.2,1.6,.2,1) both; }
  @keyframes avatarPop { 0%{opacity:0;transform:scale(0.3) rotate(-15deg);} 55%{opacity:1;transform:scale(1.15) rotate(6deg);} 80%{transform:scale(0.95) rotate(-3deg);} 100%{opacity:1;transform:scale(1) rotate(0);} }
  .avatar-float { animation: avatarFloat 3.5s ease-in-out infinite; }
  @keyframes avatarFloat { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-8px) rotate(2deg);} }
  .bubble-slide { animation: bubbleSlide .7s cubic-bezier(.2,.8,.2,1) both; animation-delay: 0.35s; opacity: 0; }
  @keyframes bubbleSlide { 0%{opacity:0;transform:translateX(-24px) scale(0.9);} 60%{opacity:1;transform:translateX(4px) scale(1.02);} 100%{opacity:1;transform:translateX(0) scale(1);} }
  .situation-reveal { animation: situationReveal .7s cubic-bezier(.2,.8,.2,1) both; animation-delay: 0.15s; opacity: 0; }
  @keyframes situationReveal { 0%{opacity:0;transform:translateY(8px);filter:blur(6px);} 100%{opacity:1;transform:translateY(0);filter:blur(0);} }
  .basket-drop-in { animation: basketDrop .8s cubic-bezier(.2,1.6,.2,1) both; animation-delay: 0.5s; opacity: 0; }
  @keyframes basketDrop { 0%{opacity:0;transform:translateY(-20px) scale(0.85);} 60%{opacity:1;transform:translateY(6px) scale(1.05);} 100%{opacity:1;transform:translateY(0) scale(1);} }
  .talking-dots span { display:inline-block; width:4px; height:4px; margin:0 2px; background: var(--elec); border-radius:9999px;
    animation: tdots 1.1s ease-in-out infinite; box-shadow: 0 0 8px var(--elec); }
  .talking-dots span:nth-child(2){animation-delay:.15s; background:var(--purple); box-shadow: 0 0 8px var(--purple);}
  .talking-dots span:nth-child(3){animation-delay:.3s; background:var(--green); box-shadow: 0 0 8px var(--green);}
  @keyframes tdots { 0%,100%{transform:translateY(0);opacity:.4;} 50%{transform:translateY(-5px);opacity:1;} }

  .scene-enter { animation: sceneEnter .5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes sceneEnter { from{opacity:0;transform:translateY(14px) scale(.985);filter:blur(4px);} to{opacity:1;transform:none;filter:none;} }
  .pop-in { animation: popin .6s cubic-bezier(.2,1.6,.2,1) both; }
  @keyframes popin { 0%{opacity:0;transform:scale(.6);} 70%{transform:scale(1.08);} 100%{opacity:1;transform:scale(1);} }
  /* Longer stagger — mirrors Adventure. Last option fully visible at ~1.6 s. */
  .stagger > * { animation: sceneEnter .55s cubic-bezier(.2,.8,.2,1) both; opacity: 0; }
  .stagger > *:nth-child(1) { animation-delay: 1s; }
  .stagger > *:nth-child(2) { animation-delay: 2s; }
  .stagger > *:nth-child(3) { animation-delay: 3s; }
  .stagger > *:nth-child(4) { animation-delay: 4s; }
  .stagger > *:nth-child(5) { animation-delay: 5s; }
  .stagger > *:nth-child(6) { animation-delay: 6s; }

  .glitch { position: relative; color: var(--green); display: inline-block; }
  .glitch::before, .glitch::after { content: attr(data-text); position: absolute; inset: 0; pointer-events: none; }
  .glitch::before { color: var(--elec); transform: translate(2px, 0); mix-blend-mode: screen; animation: glitchA 3.5s infinite steps(1); opacity: .8; }
  .glitch::after { color: var(--danger); transform: translate(-2px, 0); mix-blend-mode: screen; animation: glitchB 3.5s infinite steps(1); opacity: .55; }
  @keyframes glitchA { 0%,94%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0);} 95%{clip-path:inset(20% 0 60% 0);transform:translate(2px,-1px);} 96%{clip-path:inset(40% 0 40% 0);transform:translate(-2px,1px);} 97%{clip-path:inset(70% 0 10% 0);transform:translate(2px,2px);} 98%{clip-path:inset(10% 0 70% 0);transform:translate(-1px,-1px);} }
  @keyframes glitchB { 0%,93%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0);} 94%{clip-path:inset(50% 0 30% 0);transform:translate(-2px,1px);} 95%{clip-path:inset(10% 0 70% 0);transform:translate(2px,-2px);} 96%{clip-path:inset(70% 0 10% 0);transform:translate(-2px,2px);} 97%{clip-path:inset(30% 0 50% 0);transform:translate(1px,1px);} }

  .pulse-ring { position: relative; }
  .pulse-ring::before { content:""; position:absolute; inset:0; border-radius:inherit;
    border: 2px solid currentColor; animation: pulsering 1.8s cubic-bezier(.2,.8,.2,1) infinite; opacity: 0; }
  @keyframes pulsering { 0%{transform:scale(.85);opacity:.7;} 100%{transform:scale(1.55);opacity:0;} }

  .halo { position: relative; }
  .halo::before { content:""; position:absolute; inset:-14px; border-radius:inherit;
    background: conic-gradient(from 0deg, var(--elec), var(--green), var(--amber), var(--purple), var(--elec));
    filter: blur(16px); opacity: .45; z-index:-1; animation: spin 8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.2em; background: rgba(77,159,255,0.08); color: var(--elec); border: 1px solid rgba(77,159,255,0.25); }

  .orb { position: absolute; border-radius: 9999px; filter: blur(90px); pointer-events: none;
    animation: drift 22s ease-in-out infinite alternate; }
  @keyframes drift { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(30px,-22px) scale(1.12);} }

  .mission-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(77,159,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(77,159,255,0.05) 1px, transparent 1px);
    background-size: 56px 56px; opacity: .55; animation: grid-drift 40s linear infinite; }
  @keyframes grid-drift { to { background-position: 56px 56px; } }
  .scanlines { position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: repeating-linear-gradient(to bottom, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px); }

  .timer-crit { animation: crit-flash .7s ease-in-out infinite; }
  @keyframes crit-flash { 0%,100%{filter: drop-shadow(0 0 4px rgba(248,113,113,.5));} 50%{filter: drop-shadow(0 0 16px rgba(248,113,113,.95));} }

  .dot-glow { box-shadow: 0 0 0 4px rgba(77,159,255,0.18), 0 0 18px #4d9fffaa; }

  /* Countdown pop animation — re-fires each tick */
  .countdown-number { animation: countdownPop .75s cubic-bezier(.2,1.6,.2,1) both; display: inline-block; }
  @keyframes countdownPop {
    0%   { transform: scale(0.35); opacity: 0; letter-spacing: -0.1em; }
    50%  { transform: scale(1.14); opacity: 1; letter-spacing: 0; }
    100% { transform: scale(1);    opacity: 1; }
  }

  /* Directional "Mirror" button (L2 More/Less Like Me) with arrow-pill affordance */
  .mirror-btn { transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s; cursor: pointer; position: relative; overflow: hidden; }
  .mirror-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .mirror-btn:active:not(:disabled) { transform: translateY(0) scale(0.99); }
  .mirror-btn:disabled { cursor: not-allowed; opacity: 0.55; }
  .arrow-pill { transition: transform .28s cubic-bezier(.2,1.3,.2,1), box-shadow .25s; display: inline-flex; align-items: center; justify-content: center; }
  /* push = arrow on left pointing right, moves forward on hover (distancing) */
  .mirror-btn--push:hover:not(:disabled) .arrow-pill { transform: translateX(6px) scale(1.06); }
  .mirror-btn--push:active:not(:disabled) .arrow-pill { transform: translateX(3px) scale(0.96); }
  /* pull = arrow on right pointing left, moves inward on hover (inclusion) */
  .mirror-btn--pull:hover:not(:disabled) .arrow-pill { transform: translateX(-6px) scale(1.06); }
  .mirror-btn--pull:active:not(:disabled) .arrow-pill { transform: translateX(-3px) scale(0.96); }

  /* Scene-change pill — shown on question/card index change */
  .scene-pill {
    position: fixed; left: 50%; top: 28%;
    transform: translate(-50%, -50%);
    z-index: 55;
    pointer-events: none;
    animation: scenePill 1.2s cubic-bezier(.2,1.4,.2,1) forwards;
  }
  @keyframes scenePill {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    30%  { transform: translate(-50%, -50%) scale(1); }
    70%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.94) translateY(-8px); }
  }
  .scene-slide-in { animation: sceneSlideIn 0.55s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes sceneSlideIn {
    from { opacity: 0; transform: translateX(28px) scale(0.985); filter: blur(4px); }
    to   { opacity: 1; transform: none; filter: none; }
  }

  .toast { position: fixed; right: 24px; bottom: 24px; z-index: 60;
    animation: toast-in .35s cubic-bezier(.2,.8,.2,1) both, toast-out .35s ease-in 1.6s both; }
  @keyframes toast-in { from{opacity:0;transform:translateY(12px) scale(.97);} to{opacity:1;transform:none;} }
  @keyframes toast-out { to{opacity:0;transform:translateY(-6px);} }

  .conic-ring { background: conic-gradient(from 0deg, var(--elec), var(--purple), var(--green), var(--elec));
    animation: spin 3s linear infinite; mask-image: radial-gradient(circle, transparent 65%, black 66%);
    -webkit-mask-image: radial-gradient(circle, transparent 65%, black 66%); }

  /* Draggable + basket (mission-style) */
  .draggable-card { cursor: grab; transition: transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s, border-color .2s; }
  .draggable-card:hover { transform: translateY(-3px); border-color: rgba(77,159,255,0.45);
    box-shadow: 0 16px 30px -12px rgba(77,159,255,0.5); }
  .draggable-card:active { cursor: grabbing; }
  .draggable-card.dragging { opacity: 0.45; transform: scale(0.98) rotate(-0.5deg);
    border-color: var(--elec); box-shadow: 0 20px 60px -10px rgba(77,159,255,0.6); }
  .basket {
    background: linear-gradient(180deg, rgba(15,22,43,0.7), rgba(10,15,28,0.85));
    border: 2px dashed rgba(77,159,255,0.5);
    border-radius: 8px;
    position: relative;
    transition: all .3s cubic-bezier(.2,.8,.2,1);
  }
  .basket::before { content:""; position:absolute; inset:0; border-radius:inherit;
    background: radial-gradient(circle at 50% 50%, rgba(77,159,255,0.15), transparent 70%); pointer-events:none; }
  .basket.hover {
    border-color: var(--green); border-style: solid;
    transform: scale(1.03);
    box-shadow: 0 0 0 2px rgba(74,222,128,0.35), 0 20px 50px -12px rgba(74,222,128,0.5);
  }
  .basket.hover::before { background: radial-gradient(circle at 50% 50%, rgba(74,222,128,0.25), transparent 70%); }

  .tabular { font-variant-numeric: tabular-nums; }

  /* Manager scope — light professional */
  .manager-scope {
    --ink:#1e2746; --ink-soft:#5b6681; --ink-mute:#9aa3bd;
    --line: rgba(30,39,70,0.08); --line-2: rgba(30,39,70,0.04);
    --primary:#6366f1; --primary-2:#3b82f6;
    color: var(--ink); font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #f8faff 0%, #fff8ee 100%);
    min-height: 100vh; position: relative; z-index: 10;
  }
  .manager-scope .font-display { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; font-weight: 800; }
  .manager-scope .glass, .manager-scope .glass-strong, .manager-scope .card {
    background: #ffffff; backdrop-filter: none; -webkit-backdrop-filter: none;
    border: 1px solid rgba(30,39,70,0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 14px 40px -18px rgba(30,39,70,0.18); border-radius: 18px;
  }
  .manager-scope .opt { background:#fff; border-color: rgba(30,39,70,0.08); color:#1e2746; }
  .manager-scope .btn-ghost { background:#fff; border-color: rgba(30,39,70,0.08); color:#1e2746; }
  .manager-scope .btn-ghost:hover { border-color:#6366f1; color:#6366f1; background: rgba(99,102,241,0.05); }
  .manager-scope .chip { background: rgba(99,102,241,0.08); color:#4338ca; border-color: rgba(99,102,241,0.25); }
  .manager-scope .halo::before { display: none; }
  .manager-scope .glow-elec, .manager-scope .glow-green, .manager-scope .glow-purple { text-shadow: none; }

  ::selection { background: rgba(77,159,255,0.35); color:#fff; }
  button { cursor: pointer; font-family: inherit; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--elec); outline-offset: 3px; }
</style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const C = window.CatalystCore;
const { L1, L2, L3, L4, CONSTANTS, LEVEL_META, DIMENSION_LABEL, FINAL_LEVEL_META,
        LEVEL_SUMMARY, DEV_TIP, STRENGTH_NOTE, POS_SUMMARY, POSITIVE_BULLETS, BARS_DESCRIPTION,
        mockCandidates, computeResults, useCountUp,
        loadSavedCandidates, saveCandidate, mergeCandidates,
        shuffleArray, shuffleBalanced, fillAvatar } = C;
const { L1_TIMER, L2_CARD_TIMER, L3_TIMER, L4_TIMER, TRANSITION_MS, LOG_MS } = CONSTANTS;

/* ICONS */
const Icon = ({ name, className="w-5 h-5", stroke=1.8 }) => {
  const p = { fill:"none", stroke:"currentColor", strokeWidth:stroke, strokeLinecap:"round", strokeLinejoin:"round" };
  switch (name) {
    case "bolt":    return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>;
    case "shield":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 3 4 6v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V6l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg>;

/* MATRIX RAIN */
function MatrixRain() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let w = c.width = window.innerWidth, h = c.height = window.innerHeight;
    const fs = 14; let cols = Math.floor(w/fs);
    let drops = Array(cols).fill(0).map(()=>Math.random()*-50);
    const chars = "アカサタナハマヤラワ0123456789{}[]<>/=+*-_$".split("");
    let raf;
    const onResize = () => { w=c.width=window.innerWidth; h=c.height=window.innerHeight; cols=Math.floor(w/fs); drops=Array(cols).fill(0).map(()=>Math.random()*-50); };
    window.addEventListener("resize", onResize);
    const draw = () => {
      ctx.fillStyle = "rgba(4,6,14,0.09)"; ctx.fillRect(0,0,w,h);
      ctx.font = `${fs}px 'JetBrains Mono', monospace`;
      for (let i=0; i<cols; i++) {
        const ch = chars[Math.floor(Math.random()*chars.length)];
        const x = i*fs, y = drops[i]*fs;
        const head = Math.random() > 0.975;
        ctx.fillStyle = head ? "#c5ffe4" : "rgba(77,159,255,0.55)";
        ctx.fillText(ch, x, y);
        if (y > h && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.6 + Math.random()*0.3;
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", onResize); };
  }, []);
  return <canvas ref={ref} className="fixed inset-0" style={{opacity:0.2,pointerEvents:"none",zIndex:0}}/>;
}

/* CONFETTI */
function ConfettiBurst({ show }) {
  const parts = useMemo(()=>{
    if (!show) return [];
    return Array.from({length:90},(_,i)=>({
      id:i, angle:Math.random()*Math.PI*2, dist:160+Math.random()*420,
      delay:Math.random()*.3, duration:1.3+Math.random()*1.6, size:4+Math.random()*8,
      color:["#4d9fff","#b388ff","#4ade80","#fbbf24"][Math.floor(Math.random()*4)]
    }));
  },[show]);
  if (!show) return null;
  return (
    <div className="pointer-events-none fixed inset-0 flex items-start justify-center z-40">
      <style>{`@keyframes cfly { 0%{transform:translate(0,0) rotate(0deg);opacity:1;} 100%{transform:translate(var(--tx), var(--ty)) rotate(900deg);opacity:0;} }`}</style>
      <div className="relative top-[22vh]">
        {parts.map(p=>{
          const tx = Math.cos(p.angle)*p.dist, ty = Math.sin(p.angle)*p.dist+140;
          return <span key={p.id} style={{position:"absolute",width:p.size,height:p.size,background:p.color,borderRadius:Math.random()>.5?"2px":"9999px",boxShadow:`0 0 12px ${p.color}`,animation:`cfly ${p.duration}s cubic-bezier(.1,.7,.2,1) ${p.delay}s forwards`,["--tx"]:`${tx}px`,["--ty"]:`${ty}px`}}/>;
        })}
      </div>
    </div>
  );
}

/* CIRCULAR TIMER */
function CircularTimer({ value, max, size = 82 }) {
  const r = size/2 - 10;
  const rInner = r - 6;
  const CC = 2 * Math.PI * rInner;
  const pct = Math.max(0, Math.min(1, value / max));
  const off = CC * (1 - pct);
  const crit = value <= 3;
  const warn = value <= max * 0.4;
  const color    = crit ? "#f87171" : warn ? "#fbbf24" : "#4ade80";
  const endColor = crit ? "#fbbf24" : warn ? "#4ade80" : "#4d9fff";
  const gradId = `tg-${size}-${color.replace("#","")}`;
  const cx = size/2, cy = size/2;
  return (
    <div className={"relative " + (crit ? "timer-crit" : "")} style={{ width: size, height: size }}>
      <div className="absolute inset-0 rounded-full"
           style={{
             background: "linear-gradient(145deg, rgba(15,22,43,0.9), rgba(4,6,14,0.98))",
             boxShadow: `0 0 0 1px rgba(255,255,255,0.08), 0 8px 22px -4px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.55), 0 0 24px -4px ${color}44`
           }}/>
      <svg viewBox={`0 0 ${size} ${size}`} className="absolute inset-0">
        <defs>
          <linearGradient id={gradId} x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%"   stopColor={color}/>
            <stop offset="100%" stopColor={endColor}/>
          </linearGradient>
        </defs>
        {Array.from({ length: 12 }).map((_, i) => {
          const angle = ((i * 30) - 90) * Math.PI / 180;
          const isMajor = i % 3 === 0;
          const outerR = r + 2;
          const innerR = outerR - (isMajor ? 5 : 3);
          const x1 = cx + Math.cos(angle) * outerR;
          const y1 = cy + Math.sin(angle) * outerR;
          const x2 = cx + Math.cos(angle) * innerR;
          const y2 = cy + Math.sin(angle) * innerR;
          return (
            <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
                  stroke={isMajor ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.22)"}
                  strokeWidth={isMajor ? 1.6 : 0.9} strokeLinecap="round"/>
          );
        })}
        <circle cx={cx} cy={cy} r={rInner} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="3"/>
        <circle cx={cx} cy={cy} r={rInner} fill="none"
                stroke={`url(#${gradId})`} strokeWidth="3" strokeLinecap="round"
                strokeDasharray={CC} strokeDashoffset={off}
                transform={`rotate(-90 ${cx} ${cy})`}
                style={{ transition: "stroke-dashoffset 100ms linear", filter: `drop-shadow(0 0 8px ${color})` }}/>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-display font-black tabular leading-none"
              style={{ color, fontSize: "1.5rem", textShadow: `0 0 10px ${color}cc` }}>
          {Math.ceil(value)}
        </span>
        <span className="font-mono tracking-[0.3em] font-bold"
              style={{ fontSize: "8px", color, opacity: 0.7, marginTop: "1px" }}>SEC</span>
      </div>
    </div>
  );
}

/* LOADING */
function LoadingView({ messages }) {
  const [pct,setPct] = useState(0);
  const [msgIdx,setMsgIdx] = useState(0);
  useEffect(()=>{
    const start = Date.now(); let raf;
    const tick = () => { const p = Math.min(100, ((Date.now()-start)/TRANSITION_MS)*100); setPct(p); if (p<100) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  useEffect(()=>{
    const step = TRANSITION_MS/messages.length;
    const id = setInterval(()=>setMsgIdx(i=>Math.min(messages.length-1,i+1)), step);
    return () => clearInterval(id);
  }, [messages]);
  return (
    <div className="scene-enter max-w-2xl mx-auto flex flex-col items-center justify-center py-24 px-4">
      <div className="relative w-40 h-40 mb-8">
        <div className="absolute inset-0 rounded-full border border-white/10"/>
        <div className="absolute inset-0 rounded-full conic-ring"/>
        <div className="absolute inset-4 rounded-full flex items-center justify-center border border-white/10" style={{background:"var(--bg)"}}>
          <div className="font-display text-2xl font-bold tabular glow-elec" style={{color:"var(--elec)"}}>{pct.toFixed(0)}%</div>
        </div>
      </div>
      <div className="font-mono text-[11px] tracking-[0.4em] text-[var(--elec)] mb-2">// TRANSMITTING</div>
      <div className="font-display text-lg md:text-xl text-white tracking-widest text-center min-h-[32px]">{messages[msgIdx]}</div>
      <div className="mt-6 space-y-1.5 text-xs font-mono w-full max-w-md">
        {messages.map((m,i)=>{
          const state = i<msgIdx?"done":i===msgIdx?"active":"pending";
          return (
            <div key={m} className="flex items-center gap-3">
              <div className={"w-1.5 h-1.5 rounded-full "+(state==="done"?"bg-[var(--green)]":state==="active"?"bg-[var(--elec)] animate-pulse":"bg-white/15")}/>
              <span className={"tracking-[0.2em] "+(state==="done"?"text-white/50 line-through":state==="active"?"text-white":"text-white/25")}>

              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MissionCountdownView({ onDone }) {
  const stages = ["3", "2", "1", "GO"];
  const [tick, setTick] = useState(0);
  useEffect(() => {
    if (tick >= stages.length) { const t = setTimeout(onDone, 450); return () => clearTimeout(t); }
    const t = setTimeout(() => setTick(tick + 1), tick === 3 ? 550 : 820);
    return () => clearTimeout(t);
  }, [tick]);
  const isGo = tick === 3;
  const current = stages[Math.min(tick, stages.length - 1)];
  const pct = Math.min(100, ((tick + 1) / stages.length) * 100);
  return (
    <div className="fixed inset-0 flex flex-col items-center justify-center z-50"
         style={{background:"rgba(4,6,14,0.94)", backdropFilter:"blur(16px)", WebkitBackdropFilter:"blur(16px)"}}>
      <div className="font-mono text-xs md:text-sm tracking-[0.45em] font-bold mb-6 glow-elec" style={{color:"var(--elec)"}}>
        // LOADING_SIMULATION…
      </div>
      <div key={tick} className="countdown-number font-display tabular leading-none"
           style={{
             fontSize: isGo ? "7rem" : "11rem",
             fontWeight: 900,
             color: isGo ? "#4ade80" : "#4d9fff",
             textShadow: isGo
               ? "0 0 32px #4ade80cc, 0 0 64px #4ade8066"
               : "0 0 26px #4d9fffcc, 0 0 56px #4d9fff77"
           }}>
        {current}
      </div>
      <div className="mt-8 w-64 md:w-80 h-1.5 rounded-sm overflow-hidden" style={{background:"rgba(255,255,255,0.08)"}}>
        <div className="h-full" style={{ width: pct + "%", background: "linear-gradient(90deg, var(--elec), var(--purple), var(--green))", transition: "width .5s cubic-bezier(.2,.8,.2,1)", boxShadow: "0 0 16px rgba(77,159,255,0.6)" }}/>

}

function Level2Screen({ scenario, onSubmit, logging }) {
  const [phase, setPhase] = useState("avatar"); // avatar | briefing | playing | done
  const [avatar, setAvatar] = useState(null);
  const [deck, setDeck] = useState([]);
  const [cardIdx, setCardIdx] = useState(0);
  const [decisions, setDecisions] = useState([]);
  const [timeLeft, setTimeLeft] = useState(L2_CARD_TIMER);
  const [cardKey, setCardKey] = useState(0);
  const startedAt = useRef(Date.now());
  const cardShownAt = useRef(Date.now());

  const pickAvatar = (a) => {
    setAvatar(a);
    setDeck(shuffleBalanced(scenario.cards, 2));
    setPhase("briefing");
  };
  const beginPlaying = () => {
    startedAt.current = Date.now();
    cardShownAt.current = Date.now();
    setPhase("playing");
  };
  const finish = (finalDecisions) => {
    setPhase("done");
    const dt = Date.now() - startedAt.current;
    setTimeout(() => onSubmit({
      avatar: avatar ? avatar.id : null,
      decisions: finalDecisions,
      auto: finalDecisions.every(d => !d.decision),
      responseMs: dt
    }), 700);
  };
  const recordDecision = (decision) => {
    if (logging || phase !== "playing") return;
    const card = deck[cardIdx];
    const next = [...decisions, {
      cardId: card.id, dimension: card.dimension, level: card.level,
      decision, responseMs: Date.now() - cardShownAt.current
    }];
    setDecisions(next);
    if (cardIdx + 1 < deck.length) {
      setCardIdx(cardIdx + 1);
      setCardKey(k => k + 1);
      cardShownAt.current = Date.now();
    } else {
      finish(next);
    }
  };
  useEffect(() => {
    if (phase !== "playing" || logging) return;
    const start = Date.now(), duration = L2_CARD_TIMER * 1000;
    setTimeLeft(L2_CARD_TIMER);
    let cancelled = false, fired = false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(rem);
      if (rem <= 0 && !fired) { fired = true; recordDecision(null); }
      else if (rem > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [phase, cardIdx, logging]);

  if (phase === "done") {
    return (
      <div className="scene-enter max-w-2xl mx-auto px-4 md:px-8 py-16 text-center">

             style={{background:"rgba(251,191,36,0.1)",color:"var(--amber)",border:"1px solid rgba(251,191,36,0.4)"}}>
          <span className="text-base">✕</span> LESS_LIKE_ME

      <div key={cardKey} className="glass-strong p-5 md:p-8 relative overflow-hidden mb-6 scene-enter">

/* LEVEL 3 — Square-box sequential click (mission-themed) */
function Level3Screen({ idx, total: scenarioTotal, scenario, timeLeft, onSubmit, logging, onOrderChange }) {
  const [rankMap, setRankMap] = useState({});
  useEffect(() => { setRankMap({}); }, [scenario.id]);
  useEffect(() => {
    const ordered = [1,2,3].map(r => {
      const optId = Object.keys(rankMap).find(k => rankMap[k] === r);
      const i = scenario.options.findIndex(o => o.id === optId);
      return i;
    }).filter(i => i !== -1);
    onOrderChange && onOrderChange(ordered);
  }, [rankMap]);

  const RANK_COLOR = { 1: "#4ade80", 2: "#4d9fff", 3: "#b388ff" };
  const RANK_LABEL = { 1: "1ST", 2: "2ND", 3: "3RD" };

  const rankOf = (optId) => rankMap[optId] || null;

  const toggle = (optId) => {
    if (logging) return;
    setRankMap(prev => {
      const next = { ...prev };
      if (next[optId]) { delete next[optId]; return next; }
      for (let r = 1; r <= 3; r++) {
        if (!Object.values(next).includes(r)) { next[optId] = r; return next; }
      }
      return next;
    });
  };

  const submit = () => {
    const ordered = [1,2,3].map(r => {
      const optId = Object.keys(rankMap).find(k => rankMap[k] === r);
      return scenario.options.findIndex(o => o.id === optId);
    });
    onSubmit(ordered);
  };

  const assignedCount = Object.keys(rankMap).length;
  const allAssigned = assignedCount === 3;
  const nextRank = (() => { for (let r = 1; r <= 3; r++) if (!Object.values(rankMap).includes(r)) return r; return null; })();

  const { show: showPill, pillKey } = useScenePill(idx || 0);

  return (
    <div key={scenario.id} className="scene-slide-in max-w-3xl mx-auto px-4 md:px-8 py-6">
      {showPill && <SceneChangePill key={pillKey} idx={idx||0} total={scenarioTotal||1} label="PUZZLE" accent="#fbbf24"/>}
      <div className="mb-3 flex items-center justify-between flex-wrap gap-3 sticky top-2 z-30 glass-strong p-3 rounded-sm">
        <div className="flex items-center gap-3">
          <div className="chip" style={{background:"rgba(251,191,36,0.08)",color:"var(--amber)",borderColor:"rgba(251,191,36,0.3)"}}>
            <Icon name="target" className="w-3 h-3"/> MODULE · RANK_ORDER
          </div>
          <div className="font-mono text-xs text-white/50 tracking-widest">PUZZLE <span className="text-[var(--amber)] font-bold">{(idx||0)+1}</span> / {scenarioTotal||1}</div>
        </div>
        <CircularTimer value={timeLeft} max={L3_TIMER}/>
      </div>

      <div className="glass-strong p-5 md:p-6 mb-6 relative overflow-hidden">
        <div className="orb absolute -bottom-20 -right-16 w-64 h-64" style={{background:"#fbbf24",opacity:0.18}}/>
        <div className="flex items-center justify-between mb-2">
          <div className="font-mono text-[10px] tracking-[0.3em] text-[var(--amber)]">// STRATEGIC_CHOICE</div>
          <div className="font-mono text-[10px] tracking-[0.25em] text-white/40">DIM: {scenario.dimension.toUpperCase()}</div>
        </div>
        <div className="text-[15px] md:text-base leading-relaxed text-white/95">{scenario.situation}</div>
      </div>

      {/* How-to prompt */}
      <div className="mb-5 flex items-center justify-center">
        <div className="inline-flex items-center gap-2 px-4 py-2 rounded-sm font-mono text-xs font-bold tracking-[0.15em]"
             style={{
               background: allAssigned ? "rgba(74,222,128,0.08)" : "rgba(251,191,36,0.08)",
               color: allAssigned ? "var(--green)" : "var(--amber)",
               border: `1px solid ${allAssigned ? "rgba(74,222,128,0.35)" : "rgba(251,191,36,0.35)"}`,
               boxShadow: allAssigned ? "0 0 18px rgba(74,222,128,0.25)" : "0 0 18px rgba(251,191,36,0.2)"
             }}>
          <Icon name={allAssigned?"check":"target"} className="w-3.5 h-3.5"/>
          {allAssigned
            ? "ALL RANKED — CONFIRM TO CONTINUE"
            : `TAP IN PRIORITY ORDER — NEXT CLICK = ${RANK_LABEL[nextRank]}`}
        </div>
      </div>

      {/* Options — square rank indicator on left, text on right */}
      <div className="space-y-3">
        {scenario.options.map((opt, i) => {
          const rank = rankOf(opt.id);
          const isRanked = rank !== null;
          const color = isRanked ? RANK_COLOR[rank] : null;
          return (
            <button key={opt.id} onClick={() => toggle(opt.id)} disabled={logging}
                    className="w-full text-left rounded-sm transition-all flex items-center gap-4 p-4 md:p-5 relative overflow-hidden"
                    style={{
                      background: isRanked ? "rgba(15,22,43,0.72)" : "rgba(15,22,43,0.55)",
                      backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
                      border: `1px solid ${isRanked ? color : "rgba(255,255,255,0.1)"}`,
                      boxShadow: isRanked
                        ? `0 0 0 1px ${color}66, 0 14px 36px -12px ${color}77, inset 0 1px 0 rgba(255,255,255,0.05)`
                        : "0 2px 8px -4px rgba(0,0,0,0.3)",
                      cursor: logging ? "not-allowed" : "pointer"
                    }}>
              {isRanked && <div className="absolute inset-0 pointer-events-none" style={{background:`radial-gradient(ellipse at 10% 50%, ${color}1a, transparent 55%)`}}/>}

              {/* Square rank indicator */}
              <div className="shrink-0 w-14 h-14 md:w-16 md:h-16 rounded-sm flex items-center justify-center relative z-10 transition-all"
                   style={{
                     background: isRanked ? `linear-gradient(135deg, ${color}22, ${color}08)` : "rgba(255,255,255,0.03)",
                     border: `1px solid ${isRanked ? color : "rgba(255,255,255,0.12)"}`,
                     boxShadow: isRanked ? `inset 0 0 18px ${color}22, 0 0 18px ${color}77, 0 0 0 3px ${color}15` : "none"
                   }}>
                {isRanked ? (
                  <span className="font-display text-3xl md:text-4xl font-black tabular"
                        style={{ color: color, textShadow: `0 0 14px ${color}cc, 0 0 28px ${color}77` }}>
                    {rank}
                  </span>
                ) : (
                  <span className="text-3xl md:text-4xl font-light text-white/25">—</span>
                )}
              </div>

              {/* Option text */}
              <div className="flex-1 text-[15px] md:text-[17px] leading-relaxed text-white/95 relative z-10 font-medium">
                {opt.text}
              </div>
            </button>
          );
        })}
      </div>

      <div className="mt-5 font-mono text-[10px] tracking-[0.2em] text-white/40 text-center">
        TAP ANY RANKED OPTION TO UN-RANK IT.
      </div>

      <div className="mt-6 flex items-center justify-end">
        <button disabled={!allAssigned||logging} onClick={submit} className="btn-primary px-8 py-3 font-display text-sm flex items-center gap-2">
          <Icon name="check" className="w-4 h-4"/> CONFIRM_PRIORITY
        </button>
      </div>
    </div>
  );
}

/* MANAGER DASHBOARD */
function DimBar({ label, value, delay=0 }) {
  const [ready,setReady] = useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setReady(true),delay); return ()=>clearTimeout(t); },[delay]);
  const v = useCountUp(value, 1200, ready);
  const pct = Math.max(0,Math.min(100,(v/4)*100));
  const color = value>=3?"#10b981":value>=2?"#f59e0b":"#ef4444";
  return (
    <div>
      <div className="flex justify-between items-end mb-2">
        <span className="text-sm font-semibold">{label}</span>
        <div className="flex items-baseline gap-1.5">
          <span className="text-lg font-extrabold tabular" style={{color}}>{v.toFixed(2)}</span>
          <span className="text-xs text-[var(--ink-mute)] tabular">/ 4.00</span>
        </div>
      </div>
      <div className="h-2.5 rounded-full overflow-hidden bg-[rgba(30,39,70,0.06)]">
        <div className="h-full rounded-full" style={{width:pct+"%",background:`linear-gradient(90deg, ${color}cc, ${color})`,transition:"width 1.2s cubic-bezier(.2,.8,.2,1)",boxShadow:`0 0 10px ${color}66`}}/>
      </div>
    </div>
  );
}

  const loggingRef = useRef(false);
  useEffect(()=>{ loggingRef.current=logging; },[logging]);
  const questionShownAt = useRef(0);
  useEffect(()=>{ questionShownAt.current=Date.now(); },[view,l1Idx,l2Idx,l3Idx,l4Idx]);
  const [savedCandidates,setSavedCandidates] = useState(() => mergeCandidates(loadSavedCandidates(), mockCandidates));

  const [toast,setToast] = useState(null);
  const toastId = useRef(0);
  const showToast = (message,tone="elec") => {
    toastId.current += 1;
    const id = toastId.current;
    setToast({ id, message, tone });
    setTimeout(()=>setToast(t=>(t&&t.id===id?null:t)), 2100);
  };

    const c = [];
    if (view!=="intro") c.push("intro");
    if (l1Answers.length===L1.length) c.push("phase1");
    if (l2Answers.length===L2.length) c.push("phase2");
    if (l3Answers.length===L3.length) c.push("phase3");
    if (l4Answers.length===L4.length) c.push("phase4");
    return c;
  }, [view,l1Answers,l2Answers,l3Answers,l4Answers]);

  const activePhase = view==="intro"?"intro":view.startsWith("level1")?"phase1":view.startsWith("level2")?"phase2":view.startsWith("level3")?"phase3":view.startsWith("level4")?"phase4":view==="results"?"results":"intro";

  const totalQ = L1.length + L2.length + L3.length + L4.length;
  const answered = l1Answers.length + l2Answers.length + l3Answers.length + l4Answers.length;
  const progressPct = (answered/totalQ)*100;

  /* L1 */
  const submitL1 = useCallback((option, auto=false) => {
    if (loggingRef.current) return;
    const s = L1[l1Idx];
    const dt = Date.now() - questionShownAt.current;
    if (!auto) setL1Picked(option);
    setL1Answers(prev=>[...prev, { id:s.id, dimension:s.dimension, level:option.level, choiceId:option.id, auto, responseMs:dt }]);
    setLogging(true);
    if (!auto) showToast("ACTION LOGGED", "green");
    setTimeout(()=>{
      setLogging(false); setL1Picked(null);
      if (l1Idx+1<L1.length) setL1Idx(l1Idx+1);
      else setView("level1-complete");
    }, LOG_MS);
  }, [l1Idx]);
  useEffect(()=>{
    if (view!=="level1"||logging||skipping) return;
    const OPTIONS_REVEAL_MS = 4700;        // 4 options staggered at 1s each + 0.55s animation tail
    const duration = L1_TIMER*1000;
    setTimeLeft(L1_TIMER);
    let cancelled=false, fired=false, start=null;
    const tick = () => {
      if (cancelled || start === null) return;
      const rem = Math.max(0,(duration-(Date.now()-start))/1000);
      setTimeLeft(rem);
      if (rem<=0 && !fired) {
        fired=true;
        setSkipping(true);
        setTimeout(() => {
          const s = L1[l1Idx];
          const lowest = [...s.options].sort((a,b)=>a.level-b.level)[0];
          submitL1(lowest, true);
          setSkipping(false);
        }, 1000);
      } else if (rem>0) requestAnimationFrame(tick);
    };
    const startId = setTimeout(() => {
      if (cancelled) return;
      start = Date.now();
      requestAnimationFrame(tick);
    }, OPTIONS_REVEAL_MS);
    return ()=>{ cancelled=true; clearTimeout(startId); };
  }, [view,l1Idx,logging,skipping,submitL1]);

  /* L2 Character Mirror (9-card binary; timer inside component) */
  const submitL2 = useCallback((result) => {
    if (loggingRef.current) return;
    const s = L2[l2Idx];
    setL2Answers(prev=>[...prev, {
      id: s.id,
      avatar: result.avatar,
      decisions: result.decisions || [],
      auto: result.auto || false,
      responseMs: result.responseMs
    }]);
    setLogging(true);
    showToast(result.auto ? "MIRROR · SKIPPED" : "SIGNATURE CAPTURED", result.auto ? "amber" : "elec");
    setTimeout(()=>{
      setLogging(false);
      if (l2Idx+1<L2.length) setL2Idx(l2Idx+1);
      else setView("level2-complete");
    }, LOG_MS);
  }, [l2Idx]);

  /* L3 Rank */
  const submitL3 = useCallback((order,auto=false)=>{
    if (loggingRef.current) return;
    const s = L3[l3Idx];
    const ordered = order.map(i=>s.options[i]);
    const dt = Date.now() - questionShownAt.current;
    setL3Answers(prev=>[...prev, { id:s.id, dimension:s.dimension, rankings:ordered, auto, responseMs:dt }]);
    setLogging(true);
    showToast(auto?"TIMEOUT · ORDER LOCKED":"RANK_VECTOR STORED", auto?"amber":"purple");
    setTimeout(()=>{
      setLogging(false);
      if (l3Idx+1<L3.length) setL3Idx(l3Idx+1);
      else setView("level3-complete");
    }, LOG_MS);
  }, [l3Idx]);
  useEffect(()=>{
    if (view!=="level3"||logging||skipping) return;
    const OPTIONS_REVEAL_MS = 3700;        // 3 rank options settle + tail
    const duration = L3_TIMER*1000;
    setTimeLeft(L3_TIMER);
    let cancelled=false, fired=false, start=null;
    const tick = () => {
      if (cancelled || start === null) return;
      const rem = Math.max(0,(duration-(Date.now()-start))/1000);
      setTimeLeft(rem);
      if (rem<=0 && !fired) {
        fired=true;
        setSkipping(true);
        setTimeout(() => {
          const s = L3[l3Idx];
          const current = l3OrderRef.current || [];
          const remaining = s.options.map((_,i)=>i).filter(i => !current.includes(i));
          submitL3([...current, ...remaining], true);
          setSkipping(false);
        }, 1000);
      } else if (rem>0) requestAnimationFrame(tick);
    };
    const startId = setTimeout(() => {
      if (cancelled) return;
      start = Date.now();
      requestAnimationFrame(tick);
    }, OPTIONS_REVEAL_MS);
    return ()=>{ cancelled=true; clearTimeout(startId); };
  }, [view,l3Idx,logging,skipping,submitL3]);

  /* L4 with 20s timer */
  const submitL4 = useCallback((opt, auto=false)=>{
    if (loggingRef.current) return;
    const q = L4[l4Idx];
    const dt = Date.now() - questionShownAt.current;
    if (!auto) setL4Picked(opt);
    setL4Answers(prev=>[...prev, { id:q.id, dimension:q.dimension, level:opt.level, choiceId:opt.id, auto, responseMs:dt }]);
    setLogging(true);
    if (!auto) showToast("MOTIVE.SIGNAL PARSED", "purple");
    setTimeout(()=>{
      setLogging(false); setL4Picked(null);
      if (l4Idx+1<L4.length) setL4Idx(l4Idx+1);
      else setView("level4-complete");
    }, LOG_MS);
  }, [l4Idx]);

  useEffect(()=>{
    if (view!=="level4"||logging||skipping) return;
    const OPTIONS_REVEAL_MS = 3700;        // 3 reflection options staggered at 1s + tail
    const duration = L4_TIMER*1000;
    setTimeLeft(L4_TIMER);
    let cancelled=false, fired=false, start=null;
    const tick = () => {
      if (cancelled || start === null) return;
      const rem = Math.max(0,(duration-(Date.now()-start))/1000);
      setTimeLeft(rem);
      if (rem<=0 && !fired) {
        fired=true;
        setSkipping(true);
        setTimeout(() => {
          const q = L4[l4Idx];
          const lowest = [...q.options].sort((a,b)=>a.level-b.level)[0];
          submitL4(lowest, true);
          setSkipping(false);
        }, 1000);
      } else if (rem>0) requestAnimationFrame(tick);
    };
    const startId = setTimeout(() => {
      if (cancelled) return;
      start = Date.now();
      requestAnimationFrame(tick);
    }, OPTIONS_REVEAL_MS);
    return ()=>{ cancelled=true; clearTimeout(startId); };
  }, [view,l4Idx,logging,skipping,submitL4]);

  /* RESULTS */
  const result = useMemo(()=>{
    if (!(l1Answers.length===L1.length && l2Answers.length===L2.length && l3Answers.length===L3.length && l4Answers.length===L4.length)) return null;
    return computeResults(l1Answers,l2Answers,l3Answers,l4Answers);
  }, [l1Answers,l2Answers,l3Answers,l4Answers]);

  useEffect(()=>{
    if (!result || !candidateName) return;
    const id = "self-" + candidateName.toLowerCase().replace(/\s+/g,"-") + "-" + Date.now();
    const today = new Date().toISOString().slice(0,10);
    const entry = { id, name:candidateName, date:today, score:result.finalScore, level:result.level,
                    status:"Pending", dims:result.dimScores, meta:{ ...result.meta }, answers:null };
    saveCandidate(entry);
    setSavedCandidates(prev=>{
      const key = "self-" + candidateName.toLowerCase().replace(/\s+/g,"-");
      const filtered = prev.filter(c => !c.id.startsWith(key));
      return [entry, ...filtered];
    });
  }, [result,candidateName]);

  const restart = () => {
    setL1Answers([]);setL2Answers([]);setL3Answers([]);setL4Answers([]);
    setL1Idx(0);setL2Idx(0);setL3Idx(0);setL4Idx(0);setL4Picked(null);
    setCandidateName("");setView("intro");setRole("candidate");
  };
  const toggleRole = () => { if (role==="candidate") { setRole("manager"); setManagerView("list"); } else setRole("candidate"); };
  const onHome = () => { if (role==="manager") { setManagerView("list"); setManagerOpen(null); } };

  let body = null;
  if (role==="manager") {
    const inner = managerView==="list"
      ? <ManagerListView candidates={savedCandidates} onOpen={(c)=>{setManagerOpen(c);setManagerView("report");}} onBack={()=>setRole("candidate")}/>
      : <ManagerReportView candidate={managerOpen} onBack={()=>{setManagerView("list");setManagerOpen(null);}}/>;
    body = <div className="manager-scope">{inner}</div>;
  } else {
    switch (view) {
      case "intro":            body = <IntroView onStart={(n)=>{setCandidateName(n);transitionTo("level1",["IDENTITY VERIFIED","INITIALIZING SIMULATION","MOUNTING SJT MODULE","HANDOVER"]);}}/>; break;
      case "loading":          body = <LoadingView messages={loadingMessages}/>; break;
      case "level1":           body = <Level1Screen idx={l1Idx} total={L1.length} scenario={L1[l1Idx]} timeLeft={timeLeft} onSelect={submitL1} logging={logging} lastPicked={l1Picked}/>; break;
      case "level1-complete":  body = <LevelCompleteView levelNum={1} candidateName={candidateName} onContinue={()=>transitionTo("level2-intro",["SIGNATURE CAPTURED","MOUNTING BEHAVIORAL MONITOR","CALIBRATING BASKET","HANDOVER"])}/>; break;
      case "level2-intro":     body = <MissionLevelIntro levelNum={2} onBegin={()=>setView("level2")}/>; break;
      case "level2":           body = <Level2Screen scenario={L2[l2Idx]} onSubmit={submitL2} logging={logging}/>; break;
      case "level2-complete":  body = <LevelCompleteView levelNum={2} candidateName={candidateName} onContinue={()=>transitionTo("level3-intro",["RESPONSE STORED","INITIALIZING RANK MODULE","MOUNTING PRIORITY MAP","HANDOVER"])}/>; break;
      case "level3-intro":     body = <MissionLevelIntro levelNum={3} onBegin={()=>setView("level3")}/>; break;
      case "level3":           body = <Level3Screen idx={l3Idx} total={L3.length} scenario={L3[l3Idx]} timeLeft={timeLeft} onSubmit={(o)=>submitL3(o,false)} onOrderChange={(o)=>{l3OrderRef.current=o;}} logging={logging}/>; break;
      case "level3-complete":  body = <LevelCompleteView levelNum={3} candidateName={candidateName} onContinue={()=>transitionTo("level4-intro",["PRIORITY LOCKED","ANALYZING BEHAVIORAL PATTERNS","OPENING REFLECTION GATE","HANDOVER"])}/>; break;
      case "level4-intro":     body = <MissionLevelIntro levelNum={4} onBegin={()=>setView("level4")}/>; break;
      case "level4":           body = <Level4Screen idx={l4Idx} total={L4.length} question={L4[l4Idx]} timeLeft={timeLeft} onSelect={submitL4} logging={logging} lastPicked={l4Picked}/>; break;
      case "level4-complete":  body = <LevelCompleteView levelNum={4} candidateName={candidateName} onContinue={()=>transitionTo("results",["COMPILING BEHAVIORAL VECTOR","APPLYING WEIGHT MATRIX","RUNNING VALIDATION CHECKS","RENDERING REPORT"])}/>; break;
      case "results":          body = result ? <CandidateFinalView name={candidateName} result={result} onRestart={restart} onPortal={()=>{setRole("manager");setManagerView("list");}}/> : null; break;
    }
  }

  const showMissionBackdrop = role==="candidate";
  return (
    <div className="relative min-h-screen">
      {showMissionBackdrop && (
        <>
          <MatrixRain/>
          <div className="mission-grid"/>
          <div className="scanlines"/>
          <div className="fixed inset-0 pointer-events-none overflow-hidden" style={{zIndex:0}}>
            <div className="orb" style={{width:520,height:520,top:"-12%",left:"-8%",background:"#4d9fff",opacity:0.22}}/>
            <div className="orb" style={{width:460,height:460,bottom:"-10%",right:"-10%",background:"#b388ff",opacity:0.2,animationDelay:"-7s"}}/>
            <div className="orb" style={{width:380,height:380,top:"30%",left:"60%",background:"#4ade80",opacity:0.12,animationDelay:"-14s"}}/>
          </div>
        </>
      )}
      <div className="relative z-10">
        <AppHeader role={role} onToggleRole={toggleRole} onHome={onHome}
                   progress={role==="candidate"&&view!=="intro"?progressPct:null}
                   active={activePhase} completed={completedPhases}
                   candidateName={role==="candidate"&&view!=="intro"?candidateName:null}/>
        {body}
        <div className="max-w-6xl mx-auto px-4 md:px-8 mt-12 pt-6 text-[10px] font-mono tracking-[0.3em] text-white/30 flex justify-between items-center flex-wrap gap-3">
          <span>SIGNATURE_SPRINT · MISSION · v1.0 · 4-LEVEL</span>
          <span className="flex items-center gap-2">
            <a href="index.html" className="underline hover:text-[var(--elec)]">← SWITCH THEME</a>
            <span>·</span>
            <span className="flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-[var(--green)] animate-pulse inline-block"/> SECURE · ENCRYPTED</span>
          </span>
        </div>
      </div>
      {toast && <Toast key={toast.id} message={toast.message} tone={toast.tone}/>}
      {skipping && <SkipOverlay/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CatalystMission/>);
</script>
</body>
</html>
