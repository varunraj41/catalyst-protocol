<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Catalyst // Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<!-- SHARED LOGIC ENGINE — consumed identically by adventure.html -->
<script src="catalyst-shared.js"></script>
<style>
  :root {
    --bg:        #04060e;
    --bg-2:      #0a0f1e;
    --elec:      #4d9fff;
    --purple:    #b388ff;
    --green:     #4ade80;
    --cyan:      #22d3ee;
    --amber:     #fbbf24;
    --danger:    #f87171;
    --ink:       #e6ebf5;
    --ink-soft:  #9aa3bd;
    --ink-mute:  #6b7388;
    --glass:     rgba(13, 20, 40, 0.6);
    --glass-2:   rgba(10, 15, 28, 0.75);
    --border:    rgba(255,255,255,0.08);
    --border-2:  rgba(77,159,255,0.25);
  }
  * { box-sizing: border-box; }
  html, body, #root {
    background:
      radial-gradient(900px 500px at 10% 0%, rgba(77,159,255,0.14), transparent 60%),
      radial-gradient(900px 500px at 100% 100%, rgba(179,136,255,0.12), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100%;
  }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .font-display { font-family: 'Orbitron', 'Inter', sans-serif; letter-spacing: 0.01em; }
  .font-mono    { font-family: 'JetBrains Mono', monospace; }

  /* Glow utilities */
  .glow-elec   { text-shadow: 0 0 10px #4d9fffaa, 0 0 28px #4d9fff55; }
  .glow-purple { text-shadow: 0 0 10px #b388ffaa, 0 0 28px #b388ff55; }
  .glow-green  { text-shadow: 0 0 10px #4ade80aa, 0 0 28px #4ade8055; }
  .glow-amber  { text-shadow: 0 0 10px #fbbf24aa, 0 0 28px #fbbf2455; }
  .glow-danger { text-shadow: 0 0 10px #f87171aa, 0 0 28px #f8717155; }

  /* Glass panels */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    border-radius: 8px;
  }
  .glass-strong {
    background: var(--glass-2);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--border-2);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
  }

  /* Buttons */
  .btn-primary {
    background: linear-gradient(135deg, var(--elec) 0%, var(--purple) 100%);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.12em;
    border: none;
    border-radius: 4px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 10px 36px -8px rgba(77,159,255,0.7), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: all 0.3s cubic-bezier(.2,.8,.2,1);
    position: relative; overflow: hidden;
  }
  .btn-primary::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    transform: translateX(-100%);
    animation: shimmer 3.2s infinite;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%);} 55%,100% { transform: translateX(120%);} }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 18px 54px -8px rgba(77,159,255,0.95), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: 4px;
    transition: all 0.25s;
    font-weight: 600; letter-spacing: 0.08em;
  }
  .btn-ghost:hover { border-color: var(--elec); color: var(--elec); background: rgba(77,159,255,0.08); }

  /* Option card */
  .opt {
    position: relative;
    background: rgba(15, 22, 43, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    transition: all 0.25s cubic-bezier(.2,.8,.2,1);
    overflow: hidden;
    text-align: left; width: 100%; color: var(--ink);
  }
  .opt::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(77,159,255,0.08), rgba(179,136,255,0.08));
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .opt:hover:not(:disabled) {
    transform: translateY(-3px);
    border-color: rgba(77,159,255,0.5);
    box-shadow: 0 12px 40px -10px rgba(77,159,255,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .opt:hover:not(:disabled)::before { opacity: 1; }
  .opt.active {
    border-color: var(--green);
    background: rgba(74,222,128,0.08);
    box-shadow: 0 0 0 1px var(--green), 0 0 48px -6px rgba(74,222,128,0.55);
    animation: pulse-pick 0.8s ease-out;
  }
  @keyframes pulse-pick {
    0% { box-shadow: 0 0 0 1px var(--green), 0 0 0 0 rgba(74,222,128,0.5); }
    100% { box-shadow: 0 0 0 1px var(--green), 0 0 48px -6px rgba(74,222,128,0.55); }
  }

  /* Drag rank card */
  .rank-card {
    position: relative;
    background: rgba(15, 22, 43, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    transition: transform 0.25s cubic-bezier(.2,.8,.2,1), border-color 0.25s, box-shadow 0.25s, background 0.25s;
    cursor: grab;
  }
  .rank-card:active { cursor: grabbing; }
  .rank-card.dragging {
    opacity: 0.55;
    transform: scale(1.02) rotate(-0.3deg);
    border-color: var(--elec);
    box-shadow: 0 20px 60px -10px rgba(77,159,255,0.6);
  }
  .rank-card.drop-target::before {
    content: ""; position: absolute; left: -6px; right: -6px; top: -3px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--elec), transparent);
    border-radius: 2px;
    box-shadow: 0 0 12px var(--elec);
    animation: flash 0.6s ease-in-out infinite alternate;
  }
  @keyframes flash { from { opacity: 0.5; } to { opacity: 1; } }
  .rank-card.just-dropped { animation: bump 0.35s cubic-bezier(.2,1.6,.2,1); }
  @keyframes bump {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); box-shadow: 0 0 0 1px var(--green), 0 0 30px -4px rgba(74,222,128,0.4); }
    100% { transform: scale(1); }
  }

  /* Scene entrance */
  .scene-enter { animation: sceneEnter 0.5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes sceneEnter {
    from { opacity: 0; transform: translateY(14px) scale(0.985); filter: blur(4px); }
    to   { opacity: 1; transform: none; filter: none; }
  }
  .pop-in { animation: popin 0.6s cubic-bezier(.2,1.6,.2,1) both; }
  @keyframes popin { 0% { opacity: 0; transform: scale(0.6); } 70% { transform: scale(1.08); } 100% { opacity: 1; transform: scale(1); } }
  .stagger > * { animation: sceneEnter 0.45s cubic-bezier(.2,.8,.2,1) both; }
  .stagger > *:nth-child(1) { animation-delay: 0.04s; }
  .stagger > *:nth-child(2) { animation-delay: 0.12s; }
  .stagger > *:nth-child(3) { animation-delay: 0.20s; }
  .stagger > *:nth-child(4) { animation-delay: 0.28s; }
  .stagger > *:nth-child(5) { animation-delay: 0.36s; }

  /* Glitch title */
  .glitch { position: relative; color: var(--green); display: inline-block; }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .glitch::before { color: var(--elec); transform: translate(2px, 0); mix-blend-mode: screen; animation: glitchA 3.5s infinite steps(1); opacity: 0.8; }
  .glitch::after  { color: var(--danger); transform: translate(-2px, 0); mix-blend-mode: screen; animation: glitchB 3.5s infinite steps(1); opacity: 0.55; }
  @keyframes glitchA {
    0%,94%,100% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
    95% { clip-path: inset(20% 0 60% 0); transform: translate(2px,-1px); }
    96% { clip-path: inset(40% 0 40% 0); transform: translate(-2px,1px); }
    97% { clip-path: inset(70% 0 10% 0); transform: translate(2px,2px); }
    98% { clip-path: inset(10% 0 70% 0); transform: translate(-1px,-1px); }
  }
  @keyframes glitchB {
    0%,93%,100% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
    94% { clip-path: inset(50% 0 30% 0); transform: translate(-2px,1px); }
    95% { clip-path: inset(10% 0 70% 0); transform: translate(2px,-2px); }
    96% { clip-path: inset(70% 0 10% 0); transform: translate(-2px,2px); }
    97% { clip-path: inset(30% 0 50% 0); transform: translate(1px,1px); }
  }

  /* Pulse ring */
  .pulse-ring { position: relative; }
  .pulse-ring::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    border: 2px solid currentColor;
    animation: pulsering 1.8s cubic-bezier(.2,.8,.2,1) infinite;
    opacity: 0;
  }
  @keyframes pulsering {
    0%   { transform: scale(0.85); opacity: 0.7; }
    100% { transform: scale(1.55); opacity: 0; }
  }

  /* Halo (conic) */
  .halo { position: relative; }
  .halo::before {
    content: ""; position: absolute; inset: -14px;
    border-radius: inherit;
    background: conic-gradient(from 0deg, var(--elec), var(--green), var(--amber), var(--purple), var(--elec));
    filter: blur(16px); opacity: 0.45; z-index: -1;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tilt card interaction */
  .tilt { transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s; transform-style: preserve-3d; }

  /* Chip */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.2em;
    background: rgba(77,159,255,0.08);
    color: var(--elec);
    border: 1px solid rgba(77,159,255,0.25);
  }

  /* Ambient orbs (mission) */
  .orb {
    position: absolute; border-radius: 9999px;
    filter: blur(90px); pointer-events: none;
    animation: drift 22s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,-22px) scale(1.12); }
  }

  /* Grid overlay */
  .mission-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(77,159,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(77,159,255,0.05) 1px, transparent 1px);
    background-size: 56px 56px;
    opacity: 0.55;
    animation: grid-drift 40s linear infinite;
  }
  @keyframes grid-drift { to { background-position: 56px 56px; } }
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: repeating-linear-gradient(to bottom, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  }

  /* Timer critical */
  .timer-crit { animation: crit-flash 0.7s ease-in-out infinite; }
  @keyframes crit-flash {
    0%,100% { filter: drop-shadow(0 0 4px rgba(248,113,113,0.5)); }
    50%     { filter: drop-shadow(0 0 16px rgba(248,113,113,0.95)); }
  }

  /* Dots */
  .dot-glow { box-shadow: 0 0 0 4px rgba(77,159,255,0.18), 0 0 18px #4d9fffaa; }

  /* Toast */
  .toast {
    position: fixed; right: 24px; bottom: 24px; z-index: 60;
    animation: toast-in 0.35s cubic-bezier(.2,.8,.2,1) both, toast-out 0.35s ease-in 1.6s both;
  }
  @keyframes toast-in  { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: none; } }
  @keyframes toast-out { to   { opacity: 0; transform: translateY(-6px); } }

  /* Conic spinner ring for loading */
  .conic-ring {
    background: conic-gradient(from 0deg, var(--elec), var(--purple), var(--green), var(--elec));
    animation: spin 3s linear infinite;
    mask-image: radial-gradient(circle, transparent 65%, black 66%);
    -webkit-mask-image: radial-gradient(circle, transparent 65%, black 66%);
  }

  /* Tabular */
  .tabular { font-variant-numeric: tabular-nums; }

  /* Manager scope — force clean light Inter */
  .manager-scope {
    --ink: #1e2746;
    --ink-soft: #5b6681;
    --ink-mute: #9aa3bd;
    --line: rgba(30,39,70,0.08);
    --line-2: rgba(30,39,70,0.04);
    --primary: #6366f1;
    --primary-2: #3b82f6;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #f8faff 0%, #fff8ee 100%);
    min-height: 100vh;
    position: relative; z-index: 10;
  }
  .manager-scope .font-display { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; font-weight: 800; }
  .manager-scope .glass, .manager-scope .glass-strong, .manager-scope .card {
    background: #ffffff;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: 1px solid rgba(30,39,70,0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 14px 40px -18px rgba(30,39,70,0.18);
    border-radius: 18px;
  }
  .manager-scope .opt { background: #fff; border-color: rgba(30,39,70,0.08); color: #1e2746; }
  .manager-scope .btn-ghost { background: #fff; border-color: rgba(30,39,70,0.08); color: #1e2746; }
  .manager-scope .btn-ghost:hover { border-color: #6366f1; color: #6366f1; background: rgba(99,102,241,0.05); }
  .manager-scope .chip { background: rgba(99,102,241,0.08); color: #4338ca; border-color: rgba(99,102,241,0.25); }
  .manager-scope .halo::before { display: none; }
  .manager-scope .glow-elec,
  .manager-scope .glow-purple,
  .manager-scope .glow-green,
  .manager-scope .glow-amber,
  .manager-scope .glow-danger { text-shadow: none; }

  ::selection { background: rgba(77,159,255,0.35); color: #fff; }
  button { cursor: pointer; font-family: inherit; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--elec); outline-offset: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const C = window.CatalystCore;
const { L1, L2, L3, CONSTANTS, LEVEL_META, DIMENSION_LABEL, FINAL_LEVEL_META,
        LEVEL_SUMMARY, DEV_TIP, STRENGTH_NOTE, POS_SUMMARY, POSITIVE_BULLETS,
        mockCandidates, computeResults, useCountUp } = C;
const { L1_TIMER, L2_TIMER, TRANSITION_MS, LOG_MS } = CONSTANTS;

/* =========== ICONS =========== */
const Icon = ({ name, className = "w-5 h-5", stroke = 1.8 }) => {
  const p = { fill: "none", stroke: "currentColor", strokeWidth: stroke, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "bolt":    return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>;
    case "shield":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 3 4 6v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V6l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg>;
    case "flame":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 2s4 4 4 9a4 4 0 0 1-8 0c0-2 1-3 1-5Z"/></svg>;
    case "sprout":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 22V10"/><path d="M12 10c0-4 4-6 8-6 0 4-2 8-8 8Z"/></svg>;
    case "target":  return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>;
    case "spark":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m12 3 2 6 6 2-6 2-2 6-2-6-6-2 6-2Z"/></svg>;
    case "cpu":     return <svg viewBox="0 0 24 24" className={className} {...p}><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M15 2v2M15 20v2M9 2v2M9 20v2M2 15h2M2 9h2M20 15h2M20 9h2"/></svg>;
    case "pulse":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M3 12h4l3-8 4 16 3-8h4"/></svg>;
    case "alert":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 3 2 21h20L12 3Z"/><path d="M12 10v5M12 18h.01"/></svg>;
    case "trophy":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M7 3h10v5a5 5 0 0 1-10 0V3Z"/><path d="M4 5h3M17 5h3M12 13v4M8 21h8M10 21v-4h4v4"/></svg>;
    case "grip":    return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg>;
    case "arrow-up":    return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 19V5M5 12l7-7 7 7"/></svg>;
    case "arrow-down":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 5v14M5 12l7 7 7-7"/></svg>;
    case "arrow-right": return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case "check":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m5 12 5 5L20 7"/></svg>;
    case "play":    return <svg viewBox="0 0 24 24" className={className}><path d="m6 4 14 8-14 8V4Z" fill="currentColor"/></svg>;
    case "restart": return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>;
    case "download":return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M12 4v12M6 12l6 6 6-6M4 20h16"/></svg>;
    case "user":    return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>;
    case "briefcase":return <svg viewBox="0 0 24 24" className={className} {...p}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 13h18"/></svg>;
    case "clock":   return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case "sparkles":return <svg viewBox="0 0 24 24" className={className} {...p}><path d="m12 3 1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3ZM5 17l.8 2.2L8 20l-2.2.8L5 23l-.8-2.2L2 20l2.2-.8L5 17Z"/></svg>;
    case "star":    return <svg viewBox="0 0 24 24" className={className}><path d="m12 2 2.9 6.9L22 10l-5.5 4.8L18 22l-6-3.5L6 22l1.5-7.2L2 10l7.1-1.1L12 2Z" fill="currentColor"/></svg>;
    case "compass": return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="12" cy="12" r="9"/><path d="m15 9-2 6-4 2 2-6 4-2Z"/></svg>;
    case "chess":   return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M8 22h8M9 18h6M9 18v-2a3 3 0 0 1 6 0v2M12 13V9M8 9h8l-1-3H9l-1 3ZM11 6V3h2v3"/></svg>;
    case "key":     return <svg viewBox="0 0 24 24" className={className} {...p}><circle cx="8" cy="15" r="4"/><path d="m11 12 10-10M17 6l3 3M14 9l3 3"/></svg>;
    case "portal":  return <svg viewBox="0 0 24 24" className={className} {...p}><path d="M15 3h6v6M21 3l-8 8M9 21H3v-6M3 21l8-8"/></svg>;
    default: return null;
  }
};

/* =========== MATRIX RAIN (canvas) =========== */
function MatrixRain() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    let w = c.width = window.innerWidth;
    let h = c.height = window.innerHeight;
    const fontSize = 14;
    let columns = Math.floor(w / fontSize);
    let drops = Array(columns).fill(0).map(() => Math.random() * -50);
    const chars = "アカサタナハマヤラワ0123456789{}[]<>/=+*-_$".split("");
    let raf;
    const onResize = () => {
      w = c.width = window.innerWidth;
      h = c.height = window.innerHeight;
      columns = Math.floor(w / fontSize);
      drops = Array(columns).fill(0).map(() => Math.random() * -50);
    };
    window.addEventListener("resize", onResize);
    const draw = () => {
      ctx.fillStyle = "rgba(4,6,14,0.09)";
      ctx.fillRect(0, 0, w, h);
      ctx.font = `${fontSize}px 'JetBrains Mono', monospace`;
      for (let i = 0; i < columns; i++) {
        const ch = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        const head = Math.random() > 0.975;
        ctx.fillStyle = head ? "#c5ffe4" : "rgba(77,159,255,0.55)";
        ctx.fillText(ch, x, y);
        if (y > h && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.6 + Math.random() * 0.3;
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", onResize); };
  }, []);
  return <canvas ref={ref} className="fixed inset-0" style={{ opacity: 0.2, pointerEvents: "none", zIndex: 0 }} />;
}

/* =========== CONFETTI =========== */
function ConfettiBurst({ show }) {
  const parts = useMemo(() => {
    if (!show) return [];
    return Array.from({ length: 90 }, (_, i) => ({
      id: i, angle: Math.random() * Math.PI * 2, dist: 160 + Math.random() * 420,
      delay: Math.random() * 0.3, duration: 1.3 + Math.random() * 1.6,
      size: 4 + Math.random() * 8,
      color: ["#4d9fff", "#b388ff", "#4ade80", "#fbbf24"][Math.floor(Math.random() * 4)]
    }));
  }, [show]);
  if (!show) return null;
  return (
    <div className="pointer-events-none fixed inset-0 flex items-start justify-center z-40" aria-hidden>
      <style>{`@keyframes confetti-fly { 0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) rotate(900deg); opacity: 0; } }`}</style>
      <div className="relative top-[22vh]">
        {parts.map(p => {
          const tx = Math.cos(p.angle) * p.dist;
          const ty = Math.sin(p.angle) * p.dist + 140;
          return <span key={p.id} style={{ position: "absolute", width: p.size, height: p.size, background: p.color, borderRadius: Math.random() > 0.5 ? "2px" : "9999px", boxShadow: `0 0 12px ${p.color}`, animation: `confetti-fly ${p.duration}s cubic-bezier(.1,.7,.2,1) ${p.delay}s forwards`, ["--tx"]: `${tx}px`, ["--ty"]: `${ty}px` }} />;
        })}
      </div>
    </div>
  );
}

/* =========== CIRCULAR TIMER =========== */
function CircularTimer({ value, max, size = 72 }) {
  const r = size/2 - 6;
  const CC = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, value / max));
  const off = CC * (1 - pct);
  const crit = value <= 3;
  const warn = value <= max * 0.4;
  const color = crit ? "#f87171" : warn ? "#fbbf24" : "#4ade80";
  return (
    <div className={"relative " + (crit ? "timer-crit" : "")} style={{ width: size, height: size }}>
      <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full -rotate-90">
        <defs>
          <linearGradient id={`tg-${size}`} x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%"  stopColor={color} />
            <stop offset="100%" stopColor={crit ? "#fbbf24" : warn ? "#4ade80" : "#4d9fff"} />
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="4" />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
                stroke={`url(#tg-${size})`} strokeWidth="4" strokeLinecap="round"
                strokeDasharray={CC} strokeDashoffset={off}
                style={{ transition: "stroke-dashoffset 100ms linear", filter: "drop-shadow(0 0 6px " + color + ")" }} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-display text-xl md:text-2xl font-bold tabular" style={{ color }}>{Math.ceil(value)}</span>
        <span className="text-[9px] tracking-[0.25em] text-white/50 -mt-0.5">SEC</span>
      </div>
    </div>
  );
}

function LoadingView({ messages }) {
  const [pct, setPct] = useState(0);
  const [msgIdx, setMsgIdx] = useState(0);
  useEffect(() => {
    const start = Date.now();
    let raf;
    const tick = () => {
      const p = Math.min(100, ((Date.now() - start) / TRANSITION_MS) * 100);
      setPct(p);
      if (p < 100) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  useEffect(() => {
    const step = TRANSITION_MS / messages.length;
    const id = setInterval(() => setMsgIdx(i => Math.min(messages.length - 1, i + 1)), step);
    return () => clearInterval(id);
  }, [messages]);

function ScoreMeter({ value, max = 4, level }) {
  const [ready, setReady] = useState(false);
  useEffect(() => { const t = setTimeout(() => setReady(true), 300); return () => clearTimeout(t); }, []);
  const v = useCountUp(value, 1800, ready);
  const R = 86;
  const CC = 2 * Math.PI * R;
  const pct = Math.max(0, Math.min(1, v / max));
  const off = CC * (1 - pct);
  const accent = FINAL_LEVEL_META[level].accent;
  return (
    <div className="relative" style={{ width: 220, height: 220 }}>
      <div className="absolute inset-0 halo rounded-full" style={{ opacity: 0.7 }} />

            <stop offset="0%"   stopColor="#4d9fff" />
            <stop offset="55%"  stopColor="#b388ff" />

                strokeDasharray={CC} strokeDashoffset={off}

/* =========== RADAR CHART =========== */
function RadarChart({ dimScores }) {
  const size = 200, cx = size/2, cy = size/2, R = 72;
  const dims = [
    { key: "accountability",    label: "OWN",  angle: -Math.PI/2 },
    { key: "actionOrientation", label: "ACT",  angle: -Math.PI/2 + (2*Math.PI/3) },
    { key: "perseverance",      label: "GRIT", angle: -Math.PI/2 + (4*Math.PI/3) }
  ];
  const point = (r, a) => [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
  const poly = dims.map(d => point((dimScores[d.key]/4)*R, d.angle));
  const polyStr = poly.map(p => p.join(",")).join(" ");
  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-[230px]">
      <defs>
        <radialGradient id="radarFill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#4d9fff77" />
          <stop offset="100%" stopColor="#b388ff22" />
        </radialGradient>
      </defs>
      {[1,2,3,4].map(l => (
        <polygon key={l} points={dims.map(d => point((l/4)*R, d.angle).join(",")).join(" ")}
                 fill="none" stroke="rgba(255,255,255,0.08)" strokeDasharray={l < 4 ? "3 3" : ""} />
      ))}
      {dims.map((d, i) => {
        const [x, y] = point(R, d.angle);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,0.08)" />;
      })}
      <polygon points={polyStr} fill="url(#radarFill)" stroke="#4d9fff" strokeWidth="1.6"
               style={{ filter: "drop-shadow(0 0 8px #4d9fffaa)" }} />
      {dims.map((d, i) => {
        const [px, py] = point((dimScores[d.key]/4)*R, d.angle);
        return <circle key={i} cx={px} cy={py} r="4" fill="#4d9fff" style={{ filter: "drop-shadow(0 0 6px #4d9fff)" }} />;
      })}
      {dims.map((d, i) => {
        const [lx, ly] = point(R + 20, d.angle);
        return (
          <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
                fill="#b388ff" fontSize="10" fontFamily="Orbitron" letterSpacing="3"
                style={{ textShadow: "0 0 8px #b388ff" }}>{d.label}</text>
        );
      })}
    </svg>
  );
}

function CatalystMission() {
  const params = new URLSearchParams(window.location.search);
  const initialRole = params.get("role") === "manager" ? "manager" : "candidate";

  const [role, setRole] = useState(initialRole);
  const [view, setView] = useState("intro");
  const [loadingMessages, setLoadingMessages] = useState([]);
  const [managerView, setManagerView] = useState("list");
  const [managerOpen, setManagerOpen] = useState(null);
  const [candidateName, setCandidateName] = useState("");

  const [l1Answers, setL1Answers] = useState([]);
  const [l2Answers, setL2Answers] = useState([]);
  const [l3Answers, setL3Answers] = useState([]);
  const [l1Idx, setL1Idx] = useState(0);
  const [l2Idx, setL2Idx] = useState(0);
  const [l3Idx, setL3Idx] = useState(0);
  const [l1Picked, setL1Picked] = useState(null);
  const [l3Picked, setL3Picked] = useState(null);
  const [l2Order, setL2Order] = useState(null);
  const l2OrderRef = useRef(null);
  useEffect(() => { l2OrderRef.current = l2Order; }, [l2Order]);
  const [timeLeft, setTimeLeft] = useState(L1_TIMER);
  const [logging, setLogging] = useState(false);
  const loggingRef = useRef(false);
  useEffect(() => { loggingRef.current = logging; }, [logging]);
  const questionShownAt = useRef(0);
  useEffect(() => { questionShownAt.current = Date.now(); }, [view, l1Idx, l2Idx, l3Idx]);
  const [savedCandidates, setSavedCandidates] = useState(mockCandidates);

  const [toast, setToast] = useState(null);
  const toastId = useRef(0);
  const showToast = (message, tone = "elec") => {
    toastId.current += 1;
    const id = toastId.current;
    setToast({ id, message, tone });
    setTimeout(() => setToast(t => (t && t.id === id ? null : t)), 2100);
  };

  const transitionTo = useCallback((next, messages) => {
    setLoadingMessages(messages);
    setView("loading");
    setTimeout(() => setView(next), TRANSITION_MS);
  }, []);

  const completedPhases = useMemo(() => {
    const c = [];
    if (view !== "intro") c.push("intro");
    if (l1Answers.length === L1.length) c.push("phase1");
    if (l2Answers.length === L2.length) c.push("phase2");
    if (l3Answers.length === L3.length) c.push("phase3");
    return c;
  }, [view, l1Answers, l2Answers, l3Answers]);

  const activePhase =
    view === "intro" ? "intro" :
    view.startsWith("level1") ? "phase1" :
    view.startsWith("level2") ? "phase2" :
    view.startsWith("level3") ? "phase3" :
    view === "results" ? "results" : "intro";

  const totalQ = L1.length + L2.length + L3.length;
  const answered = l1Answers.length + l2Answers.length + l3Answers.length;
  const progressPct = (answered / totalQ) * 100;

  /* LEVEL 1 */
  const submitL1 = useCallback((option, auto = false) => {
    if (loggingRef.current) return;
    const s = L1[l1Idx];
    const dt = Date.now() - questionShownAt.current;
    setL1Picked(option);
    setL1Answers(prev => [...prev, { id: s.id, dimension: s.dimension, level: option.level, auto, responseMs: dt }]);
    setLogging(true);
    showToast(auto ? "TIMEOUT · AUTO-LOGGED" : "ACTION LOGGED", auto ? "amber" : "green");
    setTimeout(() => {
      setLogging(false); setL1Picked(null);
      if (l1Idx + 1 < L1.length) setL1Idx(l1Idx + 1);
      else setView("level1-complete");
    }, LOG_MS);
  }, [l1Idx]);

  useEffect(() => {
    if (view !== "level1" || logging) return;
    const start = Date.now(), duration = L1_TIMER * 1000;
    setTimeLeft(L1_TIMER);
    let cancelled = false, fired = false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(rem);
      if (rem <= 0 && !fired) {
        fired = true;
        const s = L1[l1Idx];
        submitL1([...s.options].sort((a,b)=>a.level-b.level)[0], true);
      } else if (rem > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, l1Idx, logging, submitL1]);

  /* LEVEL 2 */
  const submitL2 = useCallback((order, auto = false) => {
    if (loggingRef.current) return;
    const s = L2[l2Idx];
    const ordered = order.map(i => s.options[i]);
    const dt = Date.now() - questionShownAt.current;
    setL2Answers(prev => [...prev, { id: s.id, dimension: s.dimension, rankings: ordered, auto, responseMs: dt }]);
    setLogging(true);
    showToast(auto ? "TIMEOUT · ORDER LOCKED" : "RANK_VECTOR STORED", auto ? "amber" : "purple");
    setTimeout(() => {
      setLogging(false); setL2Order(null);
      if (l2Idx + 1 < L2.length) setL2Idx(l2Idx + 1);
      else setView("level2-complete");
    }, LOG_MS);
  }, [l2Idx]);

  useEffect(() => {
    if (view !== "level2" || logging) return;
    const start = Date.now(), duration = L2_TIMER * 1000;
    setTimeLeft(L2_TIMER);
    let cancelled = false, fired = false;
    const tick = () => {
      if (cancelled) return;
      const rem = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(rem);
      if (rem <= 0 && !fired) {
        fired = true;
        const s = L2[l2Idx];
        const order = l2OrderRef.current || s.options.map((_, i) => i);
        submitL2(order, true);
      } else if (rem > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, l2Idx, logging, submitL2]);

  /* LEVEL 3 */
  const submitL3 = useCallback((option) => {
    if (loggingRef.current) return;
    const q = L3[l3Idx];
    const dt = Date.now() - questionShownAt.current;
    setL3Picked(option);
    setL3Answers(prev => [...prev, { id: q.id, dimension: q.dimension, level: option.level, responseMs: dt }]);
    setLogging(true);
    showToast("MOTIVE.SIGNAL PARSED", "purple");
    setTimeout(() => {
      setLogging(false); setL3Picked(null);
      if (l3Idx + 1 < L3.length) setL3Idx(l3Idx + 1);
      else setView("level3-complete");
    }, LOG_MS);
  }, [l3Idx]);

  const result = useMemo(() => {
    if (!(l1Answers.length === L1.length && l2Answers.length === L2.length && l3Answers.length === L3.length)) return null;
    return computeResults(l1Answers, l2Answers, l3Answers);
  }, [l1Answers, l2Answers, l3Answers]);

  useEffect(() => {
    if (!result || !candidateName) return;
    const id = "self-" + candidateName.toLowerCase().replace(/\s+/g,"-");
    setSavedCandidates(prev => {
      if (prev.some(c => c.id === id)) return prev;
      const today = new Date().toISOString().slice(0, 10);
      return [{ id, name: candidateName, date: today, score: result.finalScore, level: result.level, status: "Pending",
                dims: result.dimScores, meta: { ...result.meta, consistencyFlag: result.consistencyFlag }, answers: null }, ...prev];
    });
  }, [result, candidateName]);

  const restart = () => {
    setL1Answers([]); setL2Answers([]); setL3Answers([]);
    setL1Idx(0); setL2Idx(0); setL3Idx(0);
    setL2Order(null); setL1Picked(null); setL3Picked(null);
    setCandidateName(""); setView("intro"); setRole("candidate");
  };
  const toggleRole = () => { if (role === "candidate") { setRole("manager"); setManagerView("list"); } else { setRole("candidate"); } };
  const onHome = () => { if (role === "manager") { setManagerView("list"); setManagerOpen(null); } };

  let body = null;
  if (role === "manager") {
    const inner = managerView === "list"
      ? <ManagerListView candidates={savedCandidates} onOpen={(c) => { setManagerOpen(c); setManagerView("report"); }} onBack={() => setRole("candidate")} />
      : <ManagerReportView candidate={managerOpen} onBack={() => { setManagerView("list"); setManagerOpen(null); }} />;
    body = <div className="manager-scope">{inner}</div>;
  } else {
    switch (view) {
      case "intro":
        body = <IntroView onStart={(n) => { setCandidateName(n); transitionTo("level1", ["IDENTITY VERIFIED", "INITIALIZING SIMULATION", "MOUNTING SJT MODULE", "HANDOVER"]); }} />;
        break;
      case "loading":
        body = <LoadingView messages={loadingMessages} />;
        break;
      case "level1":
        body = <Level1Screen idx={l1Idx} total={L1.length} scenario={L1[l1Idx]} timeLeft={timeLeft} onSelect={submitL1} logging={logging} lastPicked={l1Picked} />;
        break;
      case "level1-complete":
        body = <LevelCompleteView levelNum={1} candidateName={candidateName} onContinue={() => transitionTo("level2", ["SIGNATURE CAPTURED","INITIALIZING RANK MODULE","MOUNTING PRIORITY MAP","HANDOVER"])} />;
        break;
      case "level2":
        body = <Level2Screen idx={l2Idx} total={L2.length} scenario={L2[l2Idx]} timeLeft={timeLeft} onSubmit={(o)=>submitL2(o,false)} onOrderChange={(o)=>setL2Order(o)} logging={logging} />;
        break;
      case "level2-complete":
        body = <LevelCompleteView levelNum={2} candidateName={candidateName} onContinue={() => transitionTo("level3", ["PRIORITY LOCKED","ANALYZING BEHAVIORAL PATTERNS","OPENING REFLECTION GATE","HANDOVER"])} />;
        break;
      case "level3":
        body = <Level3Screen idx={l3Idx} total={L3.length} question={L3[l3Idx]} onSelect={submitL3} logging={logging} lastPicked={l3Picked} />;
        break;
      case "level3-complete":
        body = <LevelCompleteView levelNum={3} candidateName={candidateName} onContinue={() => transitionTo("results", ["COMPILING BEHAVIORAL VECTOR","APPLYING WEIGHT MATRIX","GENERATING REPORT","RENDERING"])} />;
        break;
      case "results":
        body = result ? <CandidateFinalView name={candidateName} result={result} onRestart={restart} onPortal={() => { setRole("manager"); setManagerView("list"); }} /> : null;
        break;
    }
  }

  const showMissionBackdrop = role === "candidate";

  return (
    <div className="relative min-h-screen">
      {showMissionBackdrop && (
        <>
          <MatrixRain />
          <div className="mission-grid" />
          <div className="scanlines" />
          <div className="fixed inset-0 pointer-events-none overflow-hidden" style={{ zIndex: 0 }}>
            <div className="orb" style={{ width: 520, height: 520, top: "-12%", left: "-8%", background: "#4d9fff", opacity: 0.22 }} />
            <div className="orb" style={{ width: 460, height: 460, bottom: "-10%", right: "-10%", background: "#b388ff", opacity: 0.2, animationDelay: "-7s" }} />
            <div className="orb" style={{ width: 380, height: 380, top: "30%", left: "60%",   background: "#4ade80", opacity: 0.12, animationDelay: "-14s" }} />
          </div>
        </>
      )}

      <div className="relative z-10">
        <AppHeader
          role={role}
          onToggleRole={toggleRole}
          onHome={onHome}
          progress={role === "candidate" && view !== "intro" ? progressPct : null}
          active={activePhase}
          completed={completedPhases}
          candidateName={role === "candidate" && view !== "intro" ? candidateName : null}
        />
        {body}
        <div className="max-w-6xl mx-auto px-4 md:px-8 mt-12 pt-6 text-[10px] font-mono tracking-[0.3em] text-white/30 flex justify-between items-center flex-wrap gap-3">
          <span>CATALYST_PROTOCOL · MISSION-CONTROL · v0.6</span>
          <span className="flex items-center gap-2">
            <a href="index.html" className="underline hover:text-[var(--elec)]">← SWITCH THEME</a>
            <span>·</span>
            <span className="flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-[var(--green)] animate-pulse inline-block" /> SECURE · ENCRYPTED</span>
          </span>
        </div>
      </div>

      {toast && <Toast key={toast.id} message={toast.message} tone={toast.tone} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CatalystMission />);
</script>
</body>
</html>
