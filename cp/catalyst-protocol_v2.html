<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Catalyst Protocol // Band 1 Behavioral Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --neon-green: #00ff88;
    --neon-cyan:  #00e5ff;
    --neon-amber: #ffb020;
    --neon-red:   #ff4d6d;
    --neon-violet:#b388ff;
    --bg: #05060b;
    --bg-2: #0a0d18;
  }
  * { box-sizing: border-box; }
  html, body, #root { background: var(--bg); min-height: 100%; overflow-x: hidden; }
  body {
    margin: 0;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #e5e7eb;
    -webkit-font-smoothing: antialiased;
  }
  .font-display { font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif; letter-spacing: -0.01em; }

  /* Glow utilities */
  .glow-green { text-shadow: 0 0 8px #00ff8888, 0 0 20px #00ff8855; }
  .glow-cyan  { text-shadow: 0 0 8px #00e5ff99, 0 0 20px #00e5ff55; }
  .glow-amber { text-shadow: 0 0 8px #ffb02099, 0 0 20px #ffb02055; }
  .glow-red   { text-shadow: 0 0 8px #ff4d6d99, 0 0 20px #ff4d6d55; }
  .glow-violet{ text-shadow: 0 0 8px #b388ffaa, 0 0 20px #b388ff55; }
  .shadow-glow-green { box-shadow: 0 0 0 1px #00ff8844, 0 0 40px -8px #00ff8877; }
  .shadow-glow-cyan  { box-shadow: 0 0 0 1px #00e5ff44, 0 0 40px -8px #00e5ff77; }

  /* Blinking cursor */
  .cursor::after { content: "▮"; margin-left: 2px; color: #00ff88; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Entrance */
  .fade-up { animation: fadeup 0.5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes fadeup { from { opacity: 0; transform: translateY(14px) scale(0.985); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadein 0.35s ease both; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .slide-right { animation: slideright 0.45s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes slideright { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: none; } }

  /* Glitch title */
  .glitch { position: relative; color: var(--neon-green); }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .glitch::before { color: #00e5ff; transform: translate(2px, 0); mix-blend-mode: screen; animation: glitchA 3.5s infinite steps(1); opacity: 0.8; }
  .glitch::after  { color: #ff4d6d; transform: translate(-2px, 0); mix-blend-mode: screen; animation: glitchB 3.5s infinite steps(1); opacity: 0.6; }
  @keyframes glitchA {
    0%,94%,100% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
    95% { clip-path: inset(20% 0 60% 0); transform: translate(2px,-1px); }
    96% { clip-path: inset(40% 0 40% 0); transform: translate(-2px,1px); }
    97% { clip-path: inset(70% 0 10% 0); transform: translate(2px,2px); }
    98% { clip-path: inset(10% 0 70% 0); transform: translate(-1px,-1px); }
  }
  @keyframes glitchB {
    0%,93%,100% { clip-path: inset(0 0 0 0); transform: translate(0,0); }
    94% { clip-path: inset(50% 0 30% 0); transform: translate(-2px,1px); }
    95% { clip-path: inset(10% 0 70% 0); transform: translate(2px,-2px); }
    96% { clip-path: inset(70% 0 10% 0); transform: translate(-2px,2px); }
    97% { clip-path: inset(30% 0 50% 0); transform: translate(1px,1px); }
  }

  /* Scan + grid layers */
  .scanlines {
    background-image: repeating-linear-gradient(
      to bottom, rgba(0,255,136,0.03) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .grid-bg {
    background-image:
      linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: -1px -1px;
  }

  /* Shimmer sweep for buttons */
  .shimmer { position: relative; overflow: hidden; }
  .shimmer::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
    transform: translateX(-100%);
    animation: shimmer 2.8s infinite;
    pointer-events: none;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%);} 60%,100% { transform: translateX(110%);} }

  /* Orb glow */
  .orb {
    position: absolute;
    border-radius: 9999px;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(40px,-30px) scale(1.15); }
  }

  /* Card tilt */
  .tilt { transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s, border-color 0.25s, background-color 0.25s; transform-style: preserve-3d; }
  .tilt:hover { transform: translateY(-3px) scale(1.005); }
  .tilt-active { transform: translateY(-4px); }

  /* Ripple */
  .ripple { position: relative; overflow: hidden; }
  .ripple-el {
    position: absolute; border-radius: 9999px; pointer-events: none;
    background: radial-gradient(circle, rgba(0,255,136,0.55) 0%, rgba(0,255,136,0) 70%);
    transform: translate(-50%, -50%) scale(0); animation: ripple 0.8s ease-out forwards;
  }
  @keyframes ripple { to { transform: translate(-50%, -50%) scale(30); opacity: 0; } }

  /* Pulse ring */
  .pulse-ring { position: relative; }
  .pulse-ring::before {
    content: ""; position: absolute; inset: -4px; border-radius: 9999px;
    border: 2px solid #00ff88; animation: pulsering 1.6s cubic-bezier(.2,.8,.2,1) infinite; opacity: 0;
  }
  @keyframes pulsering {
    0% { transform: scale(0.7); opacity: 0.9; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Timer bar shimmer */
  .bar-stripe {
    background-image: linear-gradient(110deg, rgba(0,0,0,0) 25%, rgba(255,255,255,0.25) 50%, rgba(0,0,0,0) 75%);
    background-size: 200% 100%;
    animation: barstripe 1.4s linear infinite;
  }
  @keyframes barstripe { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* Danger shake */
  .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes shake {
    10%,90% { transform: translateX(-1px); }
    20%,80% { transform: translateX(2px); }
    30%,50%,70% { transform: translateX(-4px); }
    40%,60% { transform: translateX(4px); }
  }

  /* Stepper dot */
  .dot-glow { box-shadow: 0 0 0 4px rgba(0,255,136,0.12), 0 0 18px #00ff88aa; }

  /* Scan transition overlay */
  .scan-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: linear-gradient(180deg, rgba(0,255,136,0) 0%, rgba(0,255,136,0.14) 50%, rgba(0,255,136,0) 100%);
    animation: scanmove 1.5s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes scanmove { 0% { transform: translateY(-100%);} 100% { transform: translateY(100%);} }

  /* Chip */
  .chip {
    font-size: 10px;
    letter-spacing: 0.24em;
    padding: 3px 8px;
    border: 1px solid #00e5ff55;
    color: #00e5ff;
    border-radius: 2px;
    background: rgba(0,229,255,0.06);
  }

  /* Count-up smooth */
  .tabular { font-variant-numeric: tabular-nums; }

  /* Custom scroll if needed */
  ::selection { background: #00ff8844; color: #fff; }

  button { cursor: pointer; }
  button:focus-visible, input:focus-visible { outline: 2px solid #00e5ff; outline-offset: 3px; }

  /* Rotating conic */
  .conic {
    background: conic-gradient(from 0deg, #00ff88, #00e5ff, #b388ff, #ff4d6d, #00ff88);
    animation: spin 6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Slight float for orbs layer */
  .bg-noise::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    mix-blend-mode: overlay;
  }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback, useLayoutEffect } = React;

/* ---------- DATA ---------- */

const phase1Scenarios = [

/* ---------- CONSTANTS ---------- */

const PHASE1_TIMER = 12;
const PHASE2_TIMER = 20;

const DIMENSION_LABEL = {
  accountability: "Ownership / Accountability",

};

const PERSONA = {

const LEVEL_SUMMARY = {

};

/* ---------- SCORING ---------- */

function computeResults(p1, p2, p3) {
  const p2Scored = p2.map(a => ({
    id: a.id, dimension: a.dimension, level: a.rankings[0].level, rankings: a.rankings
  }));
  const all = [...p1, ...p2Scored, ...p3];
  const byDim = {};
  for (const a of all) (byDim[a.dimension] ||= []).push(a.level);
  const avg = arr => arr.reduce((s,n)=>s+n,0)/arr.length;
  const dimScores = {
    accountability: byDim.accountability ? avg(byDim.accountability) : 0,
    actionOrientation: byDim.actionOrientation ? avg(byDim.actionOrientation) : 0,
    perseverance: byDim.perseverance ? avg(byDim.perseverance) : 0
  };
  const finalScore =
    dimScores.accountability * 0.40 +
    dimScores.actionOrientation * 0.35 +
    dimScores.perseverance * 0.25;
  let level;
  if (finalScore >= 3.25) level = 4;
  else if (finalScore >= 2.50) level = 3;
  else if (finalScore >= 1.75) level = 2;
  else level = 1;
  let consistencyFlag = false;
  for (const p2a of p2) {
    const last = p2a.rankings[p2a.rankings.length - 1];
    if (last.level === 4) {
      const p1m = p1.find(x => x.dimension === p2a.dimension);
      if (p1m && p1m.level >= 3) { consistencyFlag = true; break; }
    }
  }
  const weakest = Object.entries(dimScores)
    .filter(([,v]) => v > 0)
    .sort((a,b) => a[1] - b[1])[0][0];
  return { dimScores, finalScore, level, consistencyFlag, weakest };
}

/* ---------- HOOKS ---------- */

function useTypewriter(text, speed = 22, start = true) {
  const [out, setOut] = useState("");
  const [done, setDone] = useState(false);
  useEffect(() => {
    if (!start) return;
    setOut(""); setDone(false);
    let i = 0;
    const id = setInterval(() => {
      i++;
      setOut(text.slice(0, i));
      if (i >= text.length) { clearInterval(id); setDone(true); }
    }, speed);
    return () => clearInterval(id);
  }, [text, speed, start]);
  return { text: out, done };
}

function useCountUp(target, duration = 1200, start = true) {
  const [v, setV] = useState(0);
  useEffect(() => {
    if (!start) return;
    const t0 = performance.now();
    let raf;
    const step = (now) => {
      const p = Math.min(1, (now - t0) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(target * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [target, duration, start]);
  return v;
}

/* ---------- ANIMATED BACKGROUND (Matrix Rain) ---------- */

function MatrixRain() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    let w = c.width = window.innerWidth;
    let h = c.height = window.innerHeight;
    const fontSize = 14;
    let columns = Math.floor(w / fontSize);
    let drops = Array(columns).fill(0).map(() => Math.random() * -50);
    const chars = "アカサタナハマヤラワ0123456789{}[]<>/=+*-_$".split("");
    let raf;
    const onResize = () => {
      w = c.width = window.innerWidth;
      h = c.height = window.innerHeight;
      columns = Math.floor(w / fontSize);
      drops = Array(columns).fill(0).map(() => Math.random() * -50);
    };
    window.addEventListener("resize", onResize);
    const draw = () => {
      ctx.fillStyle = "rgba(5,6,11,0.09)";
      ctx.fillRect(0, 0, w, h);
      ctx.font = `${fontSize}px 'JetBrains Mono', monospace`;
      for (let i = 0; i < columns; i++) {
        const ch = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        const head = Math.random() > 0.975;
        ctx.fillStyle = head ? "#b8ffe0" : "rgba(0,255,136,0.55)";
        ctx.fillText(ch, x, y);
        if (y > h && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.6 + Math.random() * 0.3;
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", onResize); };
  }, []);
  return <canvas ref={canvasRef} className="fixed inset-0 w-full h-full" style={{ opacity: 0.18, pointerEvents: "none" }} />;
}

/* ---------- CONFETTI (SVG sparkles) ---------- */

function ConfettiBurst({ show }) {
  const parts = useMemo(() => {
    if (!show) return [];
    return Array.from({ length: 80 }, (_, i) => ({
      id: i,
      angle: Math.random() * Math.PI * 2,
      dist: 140 + Math.random() * 360,
      delay: Math.random() * 0.2,
      duration: 1.2 + Math.random() * 1.3,
      size: 4 + Math.random() * 6,
      color: ["#00ff88", "#00e5ff", "#b388ff", "#ffb020"][Math.floor(Math.random() * 4)]
    }));
  }, [show]);
  if (!show) return null;
  return (
    <div className="pointer-events-none fixed inset-0 flex items-start justify-center z-40" aria-hidden>
      <style>{`
        @keyframes confetti-fly {
          0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
          100% { transform: translate(var(--tx), var(--ty)) rotate(720deg); opacity: 0; }
        }
      `}</style>
      <div className="relative top-[18vh]">
        {parts.map(p => {
          const tx = Math.cos(p.angle) * p.dist;
          const ty = Math.sin(p.angle) * p.dist + 100;
          return (
            <span
              key={p.id}
              style={{
                position: "absolute",
                width: p.size, height: p.size,
                background: p.color,
                borderRadius: Math.random() > 0.5 ? "2px" : "9999px",
                boxShadow: `0 0 12px ${p.color}`,
                animation: `confetti-fly ${p.duration}s cubic-bezier(.1,.7,.2,1) ${p.delay}s forwards`,
                ["--tx"]: `${tx}px`,
                ["--ty"]: `${ty}px`
              }}
            />
          );
        })}
      </div>
    </div>
  );
}

/* ---------- UI PIECES ---------- */

function SysLine({ children, tone = "green", delay = 0 }) {
  const cls = tone === "cyan"  ? "text-[var(--neon-cyan)] glow-cyan"
           :  tone === "amber" ? "text-[var(--neon-amber)] glow-amber"
           :  tone === "violet"? "text-[var(--neon-violet)] glow-violet"
           :                     "text-[var(--neon-green)] glow-green";
  return (
    <div className={"text-xs md:text-sm fade-up " + cls} style={{ animationDelay: `${delay}ms` }}>
      <span className="opacity-70">&gt; </span>{children}
    </div>
  );
}

function PhaseStepper({ active, completed }) {
  const steps = [
    { key: "intro",  label: "INIT" },
    { key: "phase1", label: "SJT" },
    { key: "phase2", label: "RANK" },
    { key: "phase3", label: "WHY"  },
    { key: "results",label: "REPORT" }
  ];
  return (
    <div className="flex items-center gap-1 md:gap-2 text-[10px] tracking-[0.25em] select-none">
      {steps.map((s, i) => {
        const isActive = s.key === active;
        const isDone = completed.includes(s.key);
        return (
          <React.Fragment key={s.key}>
            <div className="flex items-center gap-2">
              <div className={
                "w-2.5 h-2.5 rounded-full transition-all duration-300 " +
                (isActive ? "bg-[var(--neon-green)] dot-glow" :
                 isDone   ? "bg-[var(--neon-cyan)]" :
                            "bg-gray-700")
              } />
              <span className={isActive ? "text-[var(--neon-green)]" : isDone ? "text-[var(--neon-cyan)]" : "text-gray-600"}>
                0{i+1}·{s.label}
              </span>
            </div>
            {i < steps.length - 1 && (
              <div className={"w-4 h-px " + (isDone ? "bg-[var(--neon-cyan)]" : "bg-gray-800")} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function TimerBar({ value, max }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  const urgent = value <= 3;
  const warn   = value <= max * 0.4;
  const grad =
    urgent ? "linear-gradient(90deg,#ff4d6d 0%,#ffb020 100%)"
   : warn   ? "linear-gradient(90deg,#ffb020 0%,#00e5ff 100%)"
   :          "linear-gradient(90deg,#00ff88 0%,#00e5ff 100%)";

/* ---------- Tilt Card ---------- */

function TiltCard({ children, className = "", disabled, onClick, active }) {
  const ref = useRef(null);
  const onMove = (e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(800px) rotateX(${-y * 3}deg) rotateY(${x * 4}deg) translateY(-3px)`;
  };
  const onLeave = () => {
    const el = ref.current; if (!el) return;
    el.style.transform = "";
  };
  const handleClick = (e) => {
    if (disabled) return;
    const el = ref.current; if (el) {
      const r = el.getBoundingClientRect();
      const rx = e.clientX - r.left;
      const ry = e.clientY - r.top;
      const rip = document.createElement("span");
      rip.className = "ripple-el";
      rip.style.left = rx + "px";
      rip.style.top = ry + "px";
      rip.style.width = "10px"; rip.style.height = "10px";
      el.appendChild(rip);
      setTimeout(() => rip.remove(), 800);
    }
    onClick && onClick(e);
  };
  return (
    <button
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      onClick={handleClick}
      disabled={disabled}
      className={"tilt ripple text-left w-full " + className + (active ? " tilt-active" : "")}
    >
      {children}
    </button>
  );
}

/* ---------- RADAR (SVG) ---------- */

function DimensionRadar({ dimScores }) {
  const size = 220, cx = size/2, cy = size/2, R = 80;
  const dims = [
    { key: "accountability",    label: "OWN",  angle: -Math.PI/2 },
    { key: "actionOrientation", label: "ACT",  angle: -Math.PI/2 + (2*Math.PI/3) },
    { key: "perseverance",      label: "GRIT", angle: -Math.PI/2 + (4*Math.PI/3) }
  ];
  const levels = [1,2,3,4];
  const point = (r, a) => [cx + Math.cos(a)*r, cy + Math.sin(a)*r];
  const poly = dims.map(d => point((dimScores[d.key]/4)*R, d.angle));
  const polyStr = poly.map(p => p.join(",")).join(" ");

  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full max-w-[260px] mx-auto">
      <defs>
        <radialGradient id="rg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#00ff8855" />
          <stop offset="100%" stopColor="#00ff8811" />
        </radialGradient>
      </defs>
      {levels.map(l => (
        <polygon
          key={l}
          points={dims.map(d => point((l/4)*R, d.angle).join(",")).join(" ")}
          fill="none" stroke="#1f2937" strokeDasharray={l < 4 ? "3 3" : ""}
        />
      ))}
      {dims.map((d, i) => {
        const [x, y] = point(R+2, d.angle);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#1f2937" />;
      })}
      <polygon points={polyStr} fill="url(#rg)" stroke="#00ff88" strokeWidth="1.5" style={{ filter: "drop-shadow(0 0 6px #00ff88aa)" }} />
      {dims.map((d, i) => {
        const [px, py] = point((dimScores[d.key]/4)*R, d.angle);
        return <circle key={i} cx={px} cy={py} r="3.5" fill="#00ff88" style={{ filter: "drop-shadow(0 0 4px #00ff88)" }} />;
      })}
      {dims.map((d, i) => {
        const [lx, ly] = point(R + 18, d.angle);
        return (
          <text key={i} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
                fill="#00e5ff" fontSize="10" fontFamily="JetBrains Mono" letterSpacing="2">
            {d.label}
          </text>
        );
      })}
    </svg>
  );
}

      <div className="space-y-1.5 mb-6">

        <div className="mt-6 grid grid-cols-2 gap-4 max-w-md">

            <div className="text-[11px] tracking-widest text-gray-500">FINAL_SCORE</div>

            <div className="text-[11px] tracking-widest text-gray-500">PROFICIENCY</div>

      {result.consistencyFlag && (

          <span className="text-[var(--neon-amber)] glow-amber text-lg leading-none mt-0.5">⚠</span>
          <div>
            <div className="text-[var(--neon-amber)] glow-amber text-sm font-bold tracking-widest">
              POSSIBLE CONSISTENCY GAP DETECTED
            </div>
            <div className="text-xs md:text-sm text-amber-100/80 mt-1">
              Response signature in Phase 02 diverged from stated behavior in Phase 01. Recommend a structured follow-up in interview to probe stated vs. revealed preference.
            </div>
          </div>
        </div>
      )}

      <div className="mt-6 grid lg:grid-cols-5 gap-5">
        <div className="lg:col-span-3 border border-gray-800 bg-black/40 rounded-sm p-5 fade-up" style={{ animationDelay: "200ms" }}>

          <div className="space-y-5">

/* ---------- ROOT ---------- */

function CatalystProtocol() {
  const [view, setView] = useState("intro");
  const [prevView, setPrevView] = useState(null);
  const [loadingLabel, setLoadingLabel] = useState(null);
  const [candidateName, setCandidateName] = useState("");

  const [phase1Answers, setPhase1Answers] = useState([]);
  const [phase2Answers, setPhase2Answers] = useState([]);
  const [phase3Answers, setPhase3Answers] = useState([]);

  const [phase1Index, setPhase1Index] = useState(0);
  const [phase2Index, setPhase2Index] = useState(0);
  const [phase3Index, setPhase3Index] = useState(0);

  const [phase1Picked, setPhase1Picked] = useState(null);
  const [phase3Picked, setPhase3Picked] = useState(null);

  const [rankings, setRankings] = useState([]);
  const rankingsRef = useRef([]);
  useEffect(() => { rankingsRef.current = rankings; }, [rankings]);

  const [timeLeft, setTimeLeft] = useState(PHASE1_TIMER);
  const [logging, setLogging] = useState(false);
  const loggingRef = useRef(false);
  useEffect(() => { loggingRef.current = logging; }, [logging]);

  const [scanKey, setScanKey] = useState(0);

  const completed = useMemo(() => {
    const c = [];
    if (view !== "intro") c.push("intro");
    if (phase1Answers.length === phase1Scenarios.length) c.push("phase1");
    if (phase2Answers.length === phase2Scenarios.length) c.push("phase2");
    if (phase3Answers.length === phase3Questions.length) c.push("phase3");
    return c;
  }, [view, phase1Answers, phase2Answers, phase3Answers]);

  const transitionTo = useCallback((next, label) => {
    setLoadingLabel(label);
    setView("loading");
    setScanKey(k => k + 1);
    setTimeout(() => { setLoadingLabel(null); setView(next); setScanKey(k => k + 1); }, TRANSITION_MS);
  }, []);

  /* PHASE 1 */

  const submitPhase1 = useCallback((option, auto = false) => {
    if (loggingRef.current) return;
    const scenario = phase1Scenarios[phase1Index];
    setPhase1Picked(option);
    setPhase1Answers(prev => [...prev, {
      id: scenario.id, dimension: scenario.dimension, level: option.level, auto
    }]);
    setLogging(true);
    setTimeout(() => {
      setLogging(false); setPhase1Picked(null);
      if (phase1Index + 1 < phase1Scenarios.length) setPhase1Index(phase1Index + 1);
      else transitionTo("phase2", "NEXT MODULE · RANK_ORDER");
    }, LOG_MS);
  }, [phase1Index, transitionTo]);

  useEffect(() => {
    if (view !== "phase1" || logging) return;
    const start = Date.now(); const duration = PHASE1_TIMER * 1000;
    setTimeLeft(PHASE1_TIMER);
    let cancelled = false, fired = false;
    const tick = () => {
      if (cancelled) return;
      const remaining = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(remaining);
      if (remaining <= 0 && !fired) {
        fired = true;
        const scenario = phase1Scenarios[phase1Index];
        const lowest = [...scenario.options].sort((a,b) => a.level - b.level)[0];
        submitPhase1(lowest, true);
      } else if (remaining > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, phase1Index, logging, submitPhase1]);

  /* PHASE 2 */

  const submitPhase2 = useCallback((orderIndices, auto = false) => {
    if (loggingRef.current) return;
    const scenario = phase2Scenarios[phase2Index];
    const ordered = orderIndices.map(i => scenario.options[i]);
    setPhase2Answers(prev => [...prev, {
      id: scenario.id, dimension: scenario.dimension, rankings: ordered, auto
    }]);
    setLogging(true);
    setTimeout(() => {
      setLogging(false); setRankings([]);
      if (phase2Index + 1 < phase2Scenarios.length) setPhase2Index(phase2Index + 1);
      else transitionTo("phase3", "NEXT MODULE · ATTRIBUTION");
    }, LOG_MS);
  }, [phase2Index, transitionTo]);

  useEffect(() => {
    if (view !== "phase2" || logging) return;
    const start = Date.now(); const duration = PHASE2_TIMER * 1000;
    setTimeLeft(PHASE2_TIMER);
    let cancelled = false, fired = false;
    const tick = () => {
      if (cancelled) return;
      const remaining = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(remaining);
      if (remaining <= 0 && !fired) {
        fired = true;
        const scenario = phase2Scenarios[phase2Index];
        const current = [...rankingsRef.current];
        for (let i = 0; i < scenario.options.length; i++) if (!current.includes(i)) current.push(i);
        submitPhase2(current, true);
      } else if (remaining > 0) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, phase2Index, logging, submitPhase2]);

  const onPhase2Click = (idx) => {
    if (logging) return;
    setRankings(prev => {
      if (prev.includes(idx)) return prev.filter(i => i !== idx);
      if (prev.length >= phase2Scenarios[phase2Index].options.length) return prev;
      return [...prev, idx];
    });
  };

  /* PHASE 3 */

  const submitPhase3 = useCallback((option) => {
    if (loggingRef.current) return;
    const q = phase3Questions[phase3Index];
    setPhase3Picked(option);
    setPhase3Answers(prev => [...prev, { id: q.id, dimension: q.dimension, level: option.level }]);
    setLogging(true);
    setTimeout(() => {
      setLogging(false); setPhase3Picked(null);
      if (phase3Index + 1 < phase3Questions.length) setPhase3Index(phase3Index + 1);
      else transitionTo("results", "COMPILING REPORT");
    }, LOG_MS);
  }, [phase3Index, transitionTo]);

  /* RESULTS */

  const result = useMemo(() => {
    if (view !== "results") return null;
    return computeResults(phase1Answers, phase2Answers, phase3Answers);
  }, [view, phase1Answers, phase2Answers, phase3Answers]);

  const restart = () => {
    setPhase1Answers([]); setPhase2Answers([]); setPhase3Answers([]);
    setPhase1Index(0); setPhase2Index(0); setPhase3Index(0);
    setRankings([]); setPhase1Picked(null); setPhase3Picked(null);
    setCandidateName("");
    setView("intro");
  };

  const body = (() => {
    if (view === "intro")   return <IntroView onStart={(n) => { setCandidateName(n); transitionTo("phase1", "MODULE · SJT_BOT"); }} />;
    if (view === "loading") return <LoadingView label={loadingLabel || "NEXT MODULE..."} />;
    if (view === "phase1")  return <Phase1View index={phase1Index} total={phase1Scenarios.length} scenario={phase1Scenarios[phase1Index]} timeLeft={timeLeft} onSelect={submitPhase1} logging={logging} lastPicked={phase1Picked} completed={completed} />;
    if (view === "phase2")  return <Phase2View index={phase2Index} total={phase2Scenarios.length} scenario={phase2Scenarios[phase2Index]} timeLeft={timeLeft} rankings={rankings} onClick={onPhase2Click} onSubmit={() => submitPhase2(rankings, false)} logging={logging} completed={completed} />;
    if (view === "phase3")  return <Phase3View index={phase3Index} total={phase3Questions.length} question={phase3Questions[phase3Index]} onSelect={submitPhase3} logging={logging} lastPicked={phase3Picked} completed={completed} />;
    if (view === "results" && result) return <ResultsView name={candidateName} result={result} onRestart={restart} />;
    return null;
  })();

  return (
    <div className="relative min-h-screen bg-noise">
      <MatrixRain />
      <div className="fixed inset-0 grid-bg pointer-events-none opacity-60" />
      <div className="fixed inset-0 scanlines" />
      <div className="fixed inset-0 pointer-events-none" style={{
        background: "radial-gradient(ellipse at top, rgba(0,229,255,0.08), transparent 60%), radial-gradient(ellipse at bottom, rgba(0,255,136,0.06), transparent 60%)"
      }} />
      <div key={scanKey} className="scan-overlay" />
      <div className="relative px-4 md:px-8 py-8 md:py-12 z-10">
        {body}
        <div className="max-w-5xl mx-auto mt-12 pt-6 border-t border-gray-900 text-[10px] md:text-xs text-gray-600 tracking-widest flex justify-between">
          <span>CATALYST_PROTOCOL · v0.2.0 · POC</span>
          <span className="hidden md:inline">© HYREO_LABS // BAND_01_BEHAVIORAL_ASSESSMENT</span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CatalystProtocol />);
</script>
</body>
