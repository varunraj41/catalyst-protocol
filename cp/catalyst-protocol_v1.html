/* ---------- SCORING ---------- */

function computeResults(p1, p2, p3) {
  // Map phase2 to first-choice level per scenario
  const p2Scored = p2.map(a => ({
    id: a.id,
    dimension: a.dimension,
    level: a.rankings[0].level,
    rankings: a.rankings
  }));

  const allAnswers = [...p1, ...p2Scored, ...p3];

  const byDim = {};
  for (const a of allAnswers) {
    if (!byDim[a.dimension]) byDim[a.dimension] = [];
    byDim[a.dimension].push(a.level);
  }

  const avg = arr => arr.reduce((s, n) => s + n, 0) / arr.length;

  const dimScores = {
    accountability: byDim.accountability ? avg(byDim.accountability) : 0,
    actionOrientation: byDim.actionOrientation ? avg(byDim.actionOrientation) : 0,
    perseverance: byDim.perseverance ? avg(byDim.perseverance) : 0
  };

  const finalScore =
    dimScores.accountability * 0.40 +
    dimScores.actionOrientation * 0.35 +
    dimScores.perseverance * 0.25;

  let level;
  if (finalScore >= 3.25) level = 4;
  else if (finalScore >= 2.50) level = 3;
  else if (finalScore >= 1.75) level = 2;
  else level = 1;

  // Consistency flag:
  // In any phase 2 rank-order, if a Level 4 option is placed LAST
  // AND phase 1's answer for the SAME dimension was Level 3+, flag.
  let consistencyFlag = false;
  for (const p2a of p2) {
    const last = p2a.rankings[p2a.rankings.length - 1];
    if (last.level === 4) {
      const p1Match = p1.find(x => x.dimension === p2a.dimension);
      if (p1Match && p1Match.level >= 3) {
        consistencyFlag = true;
        break;
      }
    }
  }

  // Weakest dimension for dev tip
  const weakest = Object.entries(dimScores)
    .filter(([, v]) => v > 0)
    .sort((a, b) => a[1] - b[1])[0][0];

  return { dimScores, finalScore, level, consistencyFlag, weakest };
}

/* ---------- SMALL PIECES ---------- */

function SysLine({ children, tone = "green", blink = false }) {
  const cls = tone === "cyan" ? "text-[var(--neon-cyan)] glow-cyan"
           : tone === "amber" ? "text-[var(--neon-amber)] glow-amber"
           : "text-[var(--neon-green)] glow-green";
  return (
    <div className={"text-xs md:text-sm " + cls + (blink ? " blink" : "")}>
      <span className="opacity-80">&gt; </span>{children}
    </div>
  );
}

function TimerBar({ value, max, tone = "green" }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  const barColor =
    pct < 25 ? "linear-gradient(90deg,#ff4d6d 0%,#ffb020 100%)" :
    pct < 50 ? "linear-gradient(90deg,#ffb020 0%,#00ff88 100%)" :
               "linear-gradient(90deg,#00ff88 0%,#00e5ff 100%)";
  return (
    <div className="w-full">
      <div className="flex justify-between text-[10px] md:text-xs uppercase tracking-widest mb-1">
        <span className="text-[var(--neon-cyan)]">// timer</span>
        <span className="text-[var(--neon-green)]">{value.toFixed(1)}s</span>
      </div>
      <div className="h-2 w-full bg-gray-900 border border-gray-800 rounded-sm overflow-hidden">
        <div
          className="h-full transition-[width] duration-100 linear"
          style={{ width: pct + "%", background: barColor, boxShadow: "0 0 10px #00ff8866" }}
        />
      </div>
    </div>
  );
}

function LoadingView({ label }) {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const start = Date.now();
    let raf;
    const tick = () => {
      const p = Math.min(100, ((Date.now() - start) / TRANSITION_MS) * 100);
      setPct(p);
      if (p < 100) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  return (
    <div className="fade-in max-w-2xl mx-auto flex flex-col items-center justify-center py-24">
      <div className="text-xs text-[var(--neon-cyan)] tracking-[0.35em] mb-3">// transmitting</div>
      <div className="text-xl md:text-2xl text-[var(--neon-green)] glow-green tracking-widest blink">
        SYSTEM LOADING {label}

      <div className="w-full mt-8 h-2 bg-gray-900 border border-gray-800 rounded-sm overflow-hidden">
        <div className="bar-fill h-full transition-[width] duration-75" style={{ width: pct + "%" }} />
      </div>
      <div className="mt-3 text-[10px] tracking-widest text-gray-500">INTEGRITY CHECK {pct.toFixed(0)}%</div>
    </div>
  );
}

  return (
    <div className="fade-in max-w-3xl mx-auto">

            >

                [CHOICE_{i + 1}]
              </div>
              <div className="text-gray-100 text-sm md:text-[15px] leading-relaxed">
                {opt.text}
              </div>
            </button>
          );
        })}
      </div>

      <div className="mt-5 min-h-[20px]">
        {logging && (
          <div className="space-y-1 fade-in">
            <SysLine>logging response...</SysLine>
            <SysLine tone="cyan">motive.signal := parsed ✓</SysLine>
          </div>
        )}
      </div>
    </div>
  );
}

function ScoreBar({ label, value }) {
  const pct = Math.max(0, Math.min(100, (value / 4) * 100));
  const color =
    value >= 3 ? "#00ff88" :
    value >= 2 ? "#ffb020" :
                 "#ff4d6d";
  const tone =
    value >= 3 ? "text-[var(--neon-green)] glow-green" :
    value >= 2 ? "text-[var(--neon-amber)] glow-amber" :
                 "text-[var(--neon-red)] glow-red";
  return (
    <div>
      <div className="flex justify-between items-end mb-1">
        <span className="text-xs md:text-sm tracking-widest text-gray-300">{label}</span>
        <span className={"text-sm font-bold " + tone}>{value.toFixed(2)} / 4.00</span>
      </div>
      <div className="h-3 bg-gray-900 border border-gray-800 rounded-sm overflow-hidden">
        <div
          className="h-full transition-[width] duration-700"
          style={{
            width: pct + "%",
            background: color,
            boxShadow: `0 0 10px ${color}99`
          }}
        />
      </div>
    </div>
  );
}

        <SysLine>applying weight_matrix [0.40 · 0.35 · 0.25] ✓</SysLine>

          // CANDIDATE_PROFILE
        </div>
        <div className="text-2xl md:text-3xl font-bold tracking-wide text-gray-100">
          {name}
        </div>
        <div className="mt-4 flex flex-wrap items-baseline gap-3">
          <span className="text-[var(--neon-green)] glow-green text-5xl md:text-6xl font-extrabold tracking-tight">
            {persona.label}
          </span>
          <span className="text-[var(--neon-cyan)] glow-cyan text-xl md:text-2xl font-bold tracking-widest">

        <div className="mt-4 grid grid-cols-2 gap-4 max-w-md">

            <div className="text-2xl md:text-3xl font-bold text-[var(--neon-green)] glow-green">
              {result.finalScore.toFixed(2)}
              <span className="text-sm text-gray-500 font-normal"> / 4.00</span>

          </div>

            <div className="text-[11px] tracking-widest text-gray-500">PROFICIENCY</div>
            <div className="text-2xl md:text-3xl font-bold text-[var(--neon-cyan)] glow-cyan">

      {result.consistencyFlag && (

              Response signature in Phase 02 diverged from stated behavior in Phase 01. Recommend structured follow-up in interview to probe stated vs. revealed preference.

      )}

      <div className="mt-6 grid md:grid-cols-2 gap-5">
        <div className="border border-gray-800 bg-black/40 rounded-sm p-5">
          <div className="text-[11px] tracking-widest text-[var(--neon-cyan)] mb-4">// DIMENSION_VECTOR</div>
          <div className="space-y-4">
            <ScoreBar label={DIMENSION_LABEL.accountability} value={result.dimScores.accountability} />
            <ScoreBar label={DIMENSION_LABEL.actionOrientation} value={result.dimScores.actionOrientation} />
            <ScoreBar label={DIMENSION_LABEL.perseverance} value={result.dimScores.perseverance} />
          </div>
        </div>
        <div className="border border-gray-800 bg-black/40 rounded-sm p-5 space-y-5">

            <div className="text-sm text-gray-100 leading-relaxed">{summary[0]}</div>
            <div className="text-sm text-gray-400 leading-relaxed mt-2">{summary[1]}</div>
          </div>
          <div className="border-t border-gray-800 pt-4">
            <div className="text-[11px] tracking-widest text-[var(--neon-green)] mb-2">
              // DEVELOPMENT_FOCUS · {DIMENSION_LABEL[result.weakest]}
            </div>

      <div className="mt-8 flex flex-wrap gap-3">

          onClick={() => window.print()}
          className="px-5 py-2 font-bold text-sm tracking-[0.2em] rounded-sm border border-[var(--neon-cyan)] text-[var(--neon-cyan)] hover:bg-[var(--neon-cyan)] hover:text-black transition"
        >
          &gt; EXPORT_REPORT
        </button>
      </div>

}

/* ---------- ROOT COMPONENT ---------- */

function CatalystProtocol() {
  const [view, setView] = useState("intro");
  const [loadingLabel, setLoadingLabel] = useState(null);
  const [candidateName, setCandidateName] = useState("");

  const [phase1Answers, setPhase1Answers] = useState([]);
  const [phase2Answers, setPhase2Answers] = useState([]);
  const [phase3Answers, setPhase3Answers] = useState([]);

  const [phase1Index, setPhase1Index] = useState(0);
  const [phase2Index, setPhase2Index] = useState(0);
  const [phase3Index, setPhase3Index] = useState(0);

  const [phase1Picked, setPhase1Picked] = useState(null);
  const [phase3Picked, setPhase3Picked] = useState(null);

  const [rankings, setRankings] = useState([]);
  const rankingsRef = useRef([]);
  useEffect(() => { rankingsRef.current = rankings; }, [rankings]);

  const [timeLeft, setTimeLeft] = useState(PHASE1_TIMER);
  const [logging, setLogging] = useState(false);
  const loggingRef = useRef(false);
  useEffect(() => { loggingRef.current = logging; }, [logging]);

  const transitionTo = useCallback((next, label) => {
    setLoadingLabel(label);
    setView("loading");
    setTimeout(() => {
      setLoadingLabel(null);
      setView(next);
    }, TRANSITION_MS);
  }, []);

  /* ---------- PHASE 1 LOGIC ---------- */

  const submitPhase1 = useCallback((option, auto = false) => {
    if (loggingRef.current) return;
    const scenario = phase1Scenarios[phase1Index];
    setPhase1Picked(option);
    setPhase1Answers(prev => [...prev, {
      id: scenario.id,
      dimension: scenario.dimension,
      level: option.level,
      auto
    }]);
    setLogging(true);
    setTimeout(() => {
      setLogging(false);
      setPhase1Picked(null);
      if (phase1Index + 1 < phase1Scenarios.length) {
        setPhase1Index(phase1Index + 1);
      } else {
        transitionTo("phase2", "NEXT MODULE · RANK_ORDER");
      }
    }, LOG_MS);
  }, [phase1Index, transitionTo]);

  useEffect(() => {
    if (view !== "phase1" || logging) return;
    const start = Date.now();
    const duration = PHASE1_TIMER * 1000;
    setTimeLeft(PHASE1_TIMER);
    let cancelled = false;
    let fired = false;
    const tick = () => {
      if (cancelled) return;
      const remaining = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(remaining);
      if (remaining <= 0 && !fired) {
        fired = true;
        const scenario = phase1Scenarios[phase1Index];
        const lowest = [...scenario.options].sort((a, b) => a.level - b.level)[0];
        submitPhase1(lowest, true);
      } else if (remaining > 0) {
        requestAnimationFrame(tick);
      }
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, phase1Index, logging, submitPhase1]);

  /* ---------- PHASE 2 LOGIC ---------- */

  const submitPhase2 = useCallback((orderIndices, auto = false) => {
    if (loggingRef.current) return;
    const scenario = phase2Scenarios[phase2Index];
    const ordered = orderIndices.map(i => scenario.options[i]);
    setPhase2Answers(prev => [...prev, {
      id: scenario.id,
      dimension: scenario.dimension,
      rankings: ordered,
      auto
    }]);
    setLogging(true);
    setTimeout(() => {
      setLogging(false);
      setRankings([]);
      if (phase2Index + 1 < phase2Scenarios.length) {
        setPhase2Index(phase2Index + 1);
      } else {
        transitionTo("phase3", "NEXT MODULE · ATTRIBUTION");
      }
    }, LOG_MS);
  }, [phase2Index, transitionTo]);

  useEffect(() => {
    if (view !== "phase2" || logging) return;
    const start = Date.now();
    const duration = PHASE2_TIMER * 1000;
    setTimeLeft(PHASE2_TIMER);
    let cancelled = false;
    let fired = false;
    const tick = () => {
      if (cancelled) return;
      const remaining = Math.max(0, (duration - (Date.now() - start)) / 1000);
      setTimeLeft(remaining);
      if (remaining <= 0 && !fired) {
        fired = true;
        const scenario = phase2Scenarios[phase2Index];
        const current = [...rankingsRef.current];
        for (let i = 0; i < scenario.options.length; i++) {
          if (!current.includes(i)) current.push(i);
        }
        submitPhase2(current, true);
      } else if (remaining > 0) {
        requestAnimationFrame(tick);
      }
    };
    requestAnimationFrame(tick);
    return () => { cancelled = true; };
  }, [view, phase2Index, logging, submitPhase2]);

  const onPhase2Click = (idx) => {
    if (logging) return;
    setRankings(prev => {
      if (prev.includes(idx)) return prev.filter(i => i !== idx);
      if (prev.length >= phase2Scenarios[phase2Index].options.length) return prev;
      return [...prev, idx];
    });
  };

  /* ---------- PHASE 3 LOGIC ---------- */

  const submitPhase3 = useCallback((option) => {
    if (loggingRef.current) return;
    const q = phase3Questions[phase3Index];
    setPhase3Picked(option);
    setPhase3Answers(prev => [...prev, {
      id: q.id,
      dimension: q.dimension,
      level: option.level
    }]);
    setLogging(true);
    setTimeout(() => {
      setLogging(false);
      setPhase3Picked(null);
      if (phase3Index + 1 < phase3Questions.length) {
        setPhase3Index(phase3Index + 1);
      } else {
        transitionTo("results", "COMPILING REPORT");
      }
    }, LOG_MS);
  }, [phase3Index, transitionTo]);

  /* ---------- RESULTS ---------- */

  const result = useMemo(() => {
    if (view !== "results") return null;
    return computeResults(phase1Answers, phase2Answers, phase3Answers);
  }, [view, phase1Answers, phase2Answers, phase3Answers]);

  const restart = () => {
    setPhase1Answers([]); setPhase2Answers([]); setPhase3Answers([]);
    setPhase1Index(0);    setPhase2Index(0);    setPhase3Index(0);
    setRankings([]);      setPhase1Picked(null); setPhase3Picked(null);
    setCandidateName("");
    setView("intro");
  };

  /* ---------- RENDER ---------- */

  const body = (() => {
    if (view === "intro") {
      return <IntroView onStart={(n) => { setCandidateName(n); transitionTo("phase1", "MODULE · SJT_BOT"); }} />;
    }
    if (view === "loading") {
      return <LoadingView label={loadingLabel || "NEXT MODULE..."} />;
    }
    if (view === "phase1") {
      return (
        <Phase1View
          index={phase1Index}
          total={phase1Scenarios.length}
          scenario={phase1Scenarios[phase1Index]}
          timeLeft={timeLeft}
          onSelect={submitPhase1}
          logging={logging}
          lastPicked={phase1Picked}
        />
      );
    }
    if (view === "phase2") {
      return (
        <Phase2View
          index={phase2Index}
          total={phase2Scenarios.length}
          scenario={phase2Scenarios[phase2Index]}
          timeLeft={timeLeft}
          rankings={rankings}
          onClick={onPhase2Click}
          onSubmit={() => submitPhase2(rankings, false)}
          logging={logging}
        />
      );
    }
    if (view === "phase3") {
      return (
        <Phase3View
          index={phase3Index}
          total={phase3Questions.length}
          question={phase3Questions[phase3Index]}
          onSelect={submitPhase3}
          logging={logging}
          lastPicked={phase3Picked}
        />
      );
    }
    if (view === "results" && result) {
      return <ResultsView name={candidateName} result={result} onRestart={restart} />;
    }
    return null;
  })();

  return (
    <div className="relative min-h-screen grid-bg">
      <div className="fixed inset-0 scanlines" />
      <div className="relative px-4 md:px-8 py-8 md:py-12">
        {body}
        <div className="max-w-4xl mx-auto mt-12 pt-6 border-t border-gray-900 text-[10px] md:text-xs text-gray-600 tracking-widest flex justify-between">
          <span>CATALYST_PROTOCOL · v0.1.0 · POC</span>
          <span>© HYREO_LABS // BAND_01_BEHAVIORAL_ASSESSMENT</span>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CatalystProtocol />);
</script>
</body>
